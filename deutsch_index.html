<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Deutsch — Luyện thi A1–C2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   DESIGN SYSTEM — Linear/Vercel Dark
═══════════════════════════════════ */
:root {
  /* Core */
  --bg-0: #0a0a0f;
  --bg-1: #111118;
  --bg-2: #16161f;
  --bg-3: #1c1c28;
  --bg-4: #252535;

  /* Borders */
  --border-0: rgba(255,255,255,.06);
  --border-1: rgba(255,255,255,.1);
  --border-2: rgba(255,255,255,.16);

  /* Text */
  --text-0: #ffffff;
  --text-1: rgba(255,255,255,.82);
  --text-2: rgba(255,255,255,.5);
  --text-3: rgba(255,255,255,.28);

  /* Accent — cool blue */
  --accent: #4F8EF7;
  --accent-dim: rgba(79,142,247,.15);
  --accent-glow: rgba(79,142,247,.3);

  /* Semantic */
  --green: #3ECF8E;
  --green-dim: rgba(62,207,142,.12);
  --red: #F87171;
  --red-dim: rgba(248,113,113,.12);
  --amber: #FBBF24;
  --amber-dim: rgba(251,191,36,.12);
  --purple: #A78BFA;
  --purple-dim: rgba(167,139,250,.12);

  /* Spacing */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;

  /* Shadows */
  --sh-sm: 0 1px 8px rgba(0,0,0,.4);
  --sh-md: 0 4px 24px rgba(0,0,0,.5);
  --sh-lg: 0 8px 48px rgba(0,0,0,.6);

  /* Font */
  --font-sans: 'Geist', system-ui, sans-serif;
  --font-mono: 'Geist Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-tap-highlight-color: transparent; }
body {padding-bottom:72px!important;
  font-family: var(--font-sans);
  background: var(--bg-0);
  color: var(--text-1);
  min-height: 100vh;
  padding-bottom: 72px;
  overflow-x: hidden;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Subtle noise texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.wrap { max-width: 560px; margin: 0 auto; padding: .9rem 1rem 0; position: relative; z-index: 1; }

/* ═══ TOP BAR ═══ */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: .6rem 0; margin-bottom: .75rem;
  border-bottom: 1px solid var(--border-0);
}
.logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; font-weight: 600; color: var(--text-0); letter-spacing: -.3px;
}
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); animation: logoPulse 3s ease infinite; }
@keyframes logoPulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.top-right { display: flex; gap: 6px; }
.icon-btn {
  background: var(--bg-2); border: 1px solid var(--border-1); border-radius: var(--r-sm);
  padding: 5px 9px; font-size: 13px; cursor: pointer; color: var(--text-2);
  font-family: var(--font-sans); transition: all .15s; white-space: nowrap;
}
.icon-btn:hover { background: var(--bg-3); color: var(--text-1); border-color: var(--border-2); }
.icon-btn.accent { background: var(--accent-dim); border-color: var(--accent-glow); color: var(--accent); }

/* ═══ XP STRIP ═══ */
.xp-strip {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-1); border: 1px solid var(--border-0);
  border-radius: var(--r-md); padding: .55rem .85rem;
  margin-bottom: .7rem;
}
.lv-tag {
  font-size: 11px; font-weight: 600; color: var(--amber);
  background: var(--amber-dim); border: 1px solid rgba(251,191,36,.2);
  border-radius: 6px; padding: 2px 7px; white-space: nowrap; font-family: var(--font-mono);
}
.xp-track { flex: 1; height: 4px; background: var(--bg-4); border-radius: 2px; overflow: hidden; }
.xp-bar { height: 4px; border-radius: 2px; background: linear-gradient(90deg, var(--accent), #818CF8); transition: width .6s cubic-bezier(.4,0,.2,1); }
.xp-num { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); white-space: nowrap; }

/* ═══ META ROW ═══ */
.meta-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: .7rem; }
.tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 500; font-family: var(--font-mono);
  padding: 3px 9px; border-radius: 20px;
  border: 1px solid var(--border-1); color: var(--text-2);
  background: var(--bg-1); transition: all .15s;
}
.tag.fire { color: var(--amber); background: var(--amber-dim); border-color: rgba(251,191,36,.2); }
.tag.fire.hot { animation: hotPulse 1s ease infinite; }
@keyframes hotPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
.tag.combo { color: var(--accent); background: var(--accent-dim); border-color: var(--accent-glow); }
.tag.target { color: var(--purple); background: var(--purple-dim); border-color: rgba(167,139,250,.2); }
.tag.day { color: var(--text-2); }

/* ═══ BOTTOM NAV ═══ */
.bnav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(10,10,15,.92); backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-0);
  display: flex; z-index: 100;
}
.nb {
  flex: 1; padding: 9px 0 7px; border: none; background: transparent;
  cursor: pointer; font-family: var(--font-sans);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  color: var(--text-3); font-size: 9px; font-weight: 500;
  transition: color .15s; letter-spacing: .02em;
}
.nb.on { color: var(--accent); }
.nb-i { font-size: 18px; line-height: 1; }

/* ═══ PANELS ═══ */
.panel { display: none; }
.panel.show { display: block; animation: fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

/* ═══ CARDS ═══ */
.card {
  background: var(--bg-1); border: 1px solid var(--border-0);
  border-radius: var(--r-lg); padding: 1rem 1.1rem;
  margin-bottom: .75rem; box-shadow: var(--sh-sm);
  transition: border-color .2s;
}
.card:hover { border-color: var(--border-1); }
.card-sm {
  background: var(--bg-2); border: 1px solid var(--border-0);
  border-radius: var(--r-md); padding: .65rem .8rem; margin-bottom: .5rem;
}
.card-accent {
  background: linear-gradient(135deg, var(--accent-dim), transparent);
  border: 1px solid var(--accent-glow); border-radius: var(--r-lg);
  padding: 1rem 1.1rem; margin-bottom: .75rem;
}

/* ═══ TYPOGRAPHY ═══ */
.h1 { font-size: 22px; font-weight: 700; color: var(--text-0); letter-spacing: -.5px; line-height: 1.2; }
.h2 { font-size: 16px; font-weight: 600; color: var(--text-0); letter-spacing: -.3px; }
.h3 { font-size: 13px; font-weight: 600; color: var(--text-1); }
.label { font-size: 10px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; }
.mono { font-family: var(--font-mono); }

/* ═══ PROGRESS BAR ═══ */
.prog-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: .3rem; }
.pbar { height: 3px; background: var(--bg-4); border-radius: 2px; margin-bottom: .6rem; overflow: hidden; }
.pfill { height: 3px; border-radius: 2px; background: linear-gradient(90deg, var(--accent), #818CF8); transition: width .5s cubic-bezier(.4,0,.2,1); }
.pfill.green { background: linear-gradient(90deg, var(--green), #34D399); }
.pfill.amber { background: linear-gradient(90deg, var(--amber), #F59E0B); }
.pfill.red { background: linear-gradient(90deg, var(--red), #EF4444); }

/* ═══ BUTTONS ═══ */
.btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: .85rem; }
.btn {
  padding: 9px 18px; border-radius: var(--r-md);
  border: 1px solid var(--border-1); background: var(--bg-2);
  color: var(--text-1); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: var(--font-sans);
  transition: all .15s; letter-spacing: -.1px;
}
.btn:hover { background: var(--bg-3); border-color: var(--border-2); color: var(--text-0); }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--accent); color: #fff; border-color: transparent; box-shadow: 0 0 0 1px var(--accent-glow), 0 4px 16px rgba(79,142,247,.3); }
.btn-primary:hover { opacity: .9; background: var(--accent); }
.btn-correct { background: var(--green-dim); color: var(--green); border-color: rgba(62,207,142,.25); }
.btn-hard { background: var(--amber-dim); color: var(--amber); border-color: rgba(251,191,36,.25); }
.btn-wrong { background: var(--red-dim); color: var(--red); border-color: rgba(248,113,113,.25); }
.btn-sm { padding: 5px 11px; font-size: 12px; border-radius: var(--r-sm); }
.btn-ghost { background: transparent; border-color: var(--border-1); }

/* ═══ BADGES ═══ */
.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 6px; font-family: var(--font-mono); }
.b-A1 { color: #4ADE80; background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.2); }
.b-A2 { color: #34D399; background: rgba(52,211,153,.1); border: 1px solid rgba(52,211,153,.2); }
.b-B1 { color: #FBBF24; background: rgba(251,191,36,.1); border: 1px solid rgba(251,191,36,.2); }
.b-B2 { color: #F97316; background: rgba(249,115,22,.1); border: 1px solid rgba(249,115,22,.2); }
.b-C1 { color: #A78BFA; background: rgba(167,139,250,.1); border: 1px solid rgba(167,139,250,.2); }
.b-C2 { color: #F472B6; background: rgba(244,114,182,.1); border: 1px solid rgba(244,114,182,.2); }
.b-new { color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent-glow); }
.b-rev { color: var(--amber); background: var(--amber-dim); border: 1px solid rgba(251,191,36,.2); }
.b-ok { color: var(--green); background: var(--green-dim); border: 1px solid rgba(62,207,142,.2); }

/* ═══ SPEAK BTN ═══ */
.spk-row { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
.spk {
  background: var(--bg-3); border: 1px solid var(--border-1);
  cursor: pointer; padding: 4px 10px; border-radius: 20px; font-size: 11px;
  display: inline-flex; align-items: center; gap: 4px;
  color: var(--text-2); font-family: var(--font-sans); transition: all .15s;
}
.spk svg { width: 11px; height: 11px; fill: currentColor; }
.spk:hover { color: var(--accent); border-color: var(--accent-glow); background: var(--accent-dim); }
.spk.go { animation: pulse .7s infinite; color: var(--accent); background: var(--accent-dim); border-color: var(--accent-glow); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ═══ INPUT ═══ */
.input {
  width: 100%; padding: 9px 12px; border-radius: var(--r-md);
  border: 1px solid var(--border-1); background: var(--bg-2);
  color: var(--text-0); font-size: 14px; font-family: var(--font-sans);
  outline: none; transition: border-color .2s;
}
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.input::placeholder { color: var(--text-3); }
select.input { cursor: pointer; }
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: .8rem; }

/* ═══ SEARCH ═══ */
.search-wrap { position: relative; margin-bottom: .75rem; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
.search-input {
  width: 100%; padding: 8px 12px 8px 34px; border-radius: var(--r-md);
  border: 1px solid var(--border-1); background: var(--bg-2);
  color: var(--text-0); font-size: 13px; font-family: var(--font-sans); outline: none; transition: border-color .2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-3); }

/* ═══ FILTER PILLS ═══ */
.filter-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: .7rem; }
.fpill {
  padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border-1);
  background: var(--bg-2); font-size: 11px; font-weight: 500; cursor: pointer;
  font-family: var(--font-mono); color: var(--text-2); transition: all .15s;
}
.fpill:hover { border-color: var(--border-2); color: var(--text-1); }
.fpill.on { color: var(--text-0); background: var(--bg-3); border-color: var(--border-2); }

/* ═══ SESSION ITEMS ═══ */
.session-item {
  display: flex; align-items: center; gap: 10px;
  padding: .75rem .9rem; background: var(--bg-1); border: 1px solid var(--border-0);
  border-radius: var(--r-md); margin-bottom: .45rem; cursor: pointer;
  transition: all .2s; position: relative; overflow: hidden;
}
.session-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; border-radius: 0 2px 2px 0; background: transparent; transition: background .2s;
}
.session-item:hover { border-color: var(--border-1); background: var(--bg-2); }
.session-item:hover::before { background: var(--accent); }
.session-item.done { opacity: .45; }
.session-item.done .si-name { text-decoration: line-through; }
.session-item.weak::before { background: var(--red); }
.session-item.weak { border-color: rgba(248,113,113,.2); }
.session-item.current { border-color: var(--accent-glow); background: var(--accent-dim); }
.session-item.current::before { background: var(--accent); }
.si-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
.si-info { flex: 1; min-width: 0; }
.si-name { font-size: 13px; font-weight: 500; color: var(--text-0); }
.si-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; font-family: var(--font-mono); }
.si-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.si-mins { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); }
.si-check { font-size: 14px; }

/* ═══ DAY PLAN ═══ */
.day-prog-wrap { margin-bottom: 1rem; }
.day-prog-stats {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: .75rem;
}
.dps-card {
  background: var(--bg-2); border: 1px solid var(--border-0);
  border-radius: var(--r-md); padding: .65rem .75rem; text-align: center;
}
.dps-val { font-size: 20px; font-weight: 700; color: var(--text-0); font-family: var(--font-mono); }
.dps-lbl { font-size: 10px; color: var(--text-3); margin-top: 2px; }
.day-pbar-wrap {
  background: var(--bg-2); border: 1px solid var(--border-0);
  border-radius: var(--r-md); padding: .75rem 1rem;
}
.day-pbar-track { height: 6px; background: var(--bg-4); border-radius: 3px; overflow: hidden; margin: .4rem 0; }
.day-pbar-fill {
  height: 6px; border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), #818CF8);
  transition: width .8s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 12px var(--accent-glow);
}
.day-pbar-lbl { font-size: 12px; color: var(--text-2); text-align: center; font-family: var(--font-mono); }

/* ═══ SKILL STATS ═══ */
.skill-row {
  display: flex; align-items: center; gap: 9px;
  padding: .45rem .6rem; background: var(--bg-2);
  border: 1px solid var(--border-0); border-radius: var(--r-sm); margin-bottom: 4px;
  cursor: pointer; transition: all .15s;
}
.skill-row:hover { border-color: var(--border-1); }
.ss-icon { font-size: 15px; }
.ss-nm { font-size: 12px; font-weight: 500; color: var(--text-1); width: 62px; }
.ss-bar { flex: 1; height: 4px; background: var(--bg-4); border-radius: 2px; overflow: hidden; }
.ss-fill { height: 4px; border-radius: 2px; transition: width .5s; }
.ss-pct { font-size: 11px; color: var(--text-3); width: 30px; text-align: right; font-family: var(--font-mono); }

/* ═══ VOCAB CARD ═══ */
.vc-front { text-align: center; padding: .5rem 0; }
.vc-type { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .35rem; font-family: var(--font-mono); }
.vc-word { font-size: 30px; font-weight: 700; color: var(--text-0); margin: .25rem 0; letter-spacing: -.5px; }
.vc-art { font-size: 15px; color: var(--accent); font-weight: 500; margin-bottom: 6px; font-family: var(--font-mono); }
.vc-topic { font-size: 11px; color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent-glow); padding: 2px 8px; border-radius: 8px; display: inline-block; margin-bottom: .5rem; font-family: var(--font-mono); }
.vc-hint { font-size: 12px; color: var(--text-3); margin-top: 12px; }
.vc-meaning { font-size: 24px; font-weight: 700; color: var(--text-0); text-align: center; margin: .5rem 0; letter-spacing: -.3px; }
.divider { width: 1px; height: 24px; background: var(--border-1); margin: .5rem auto; width: 32px; height: 1px; }

/* ═══ SENTENCE BLOCK ═══ */
.s-block {
  background: var(--bg-2); border: 1px solid var(--border-0);
  border-radius: var(--r-md); padding: .7rem .85rem; margin-bottom: .5rem;
  border-left: 2px solid var(--border-2);
}
.s-block.accent-border { border-left-color: var(--accent); }
.s-lbl { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; font-family: var(--font-mono); font-weight: 600; }
.s-de { font-size: 13.5px; font-style: italic; color: var(--text-1); line-height: 1.7; }
.s-de .hl { background: var(--accent-dim); color: var(--accent); border-radius: 4px; padding: 0 3px; font-style: normal; font-weight: 600; border-bottom: 1px solid var(--accent-glow); }
.s-vi { font-size: 12px; color: var(--text-2); margin-top: 5px; padding-top: 5px; border-top: 1px solid var(--border-0); }
.srs-info { font-size: 11px; color: var(--text-3); text-align: center; margin-top: .4rem; font-family: var(--font-mono); }

/* ═══ GRAMMAR ANALYSIS ═══ */
.grammar-analysis {
  background: var(--bg-2); border: 1px solid var(--border-0);
  border-radius: var(--r-md); margin-top: .5rem; overflow: hidden;
}
.ga-toggle {
  width: 100%; padding: .6rem .85rem; background: transparent; border: none;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; font-family: var(--font-sans); font-size: 12px;
  color: var(--text-2); transition: all .15s;
}
.ga-toggle:hover { background: var(--bg-3); color: var(--text-1); }
.ga-body { display: none; padding: .7rem .85rem; border-top: 1px solid var(--border-0); }
.ga-toggle.open + .ga-body { display: block; }
.ga-toggle.open { color: var(--accent); }
.ga-point { margin-bottom: .6rem; padding-bottom: .6rem; border-bottom: 1px solid var(--border-0); }
.ga-point:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.ga-struct { font-family: var(--font-mono); font-size: 12px; color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent-glow); border-radius: 5px; padding: 2px 7px; display: inline-block; margin-bottom: 4px; }
.ga-explain { font-size: 12px; color: var(--text-2); line-height: 1.6; }
.ga-example { font-size: 11px; color: var(--green); font-style: italic; margin-top: 3px; padding: 2px 7px; background: var(--green-dim); border-radius: 5px; display: inline-block; }

/* ═══ GRAMMAR FILL ═══ */
.g-context {
  background: var(--purple-dim); border: 1px solid rgba(167,139,250,.2);
  border-radius: var(--r-md); padding: .6rem .85rem; margin-bottom: .6rem;
}
.g-ctx-title { font-size: 12px; font-weight: 600; color: var(--purple); margin-bottom: 2px; }
.g-ctx-formula { font-size: 11px; color: var(--text-2); font-family: var(--font-mono); }
.g-sentence { font-size: 16px; line-height: 2.4; text-align: center; color: var(--text-1); margin: .5rem 0; }
.g-blank {
  border: none; border-bottom: 2px solid var(--accent);

/* ═══ WORD ORDER ═══ */

/* ═══ LISTEN ═══ */
.listen-btn {

.listen-transcript {

.mopt {

}
.mopt:hover { border-color: var(--border-2); background: var(--bg-3); }
.mopt.ok { background: var(--green-dim); border-color: rgba(62,207,142,.3); color: var(--green); }
.mopt.no { background: var(--red-dim); border-color: rgba(248,113,113,.3); color: var(--red); }
.mopt.show { background: var(--green-dim); border-color: rgba(62,207,142,.3); color: var(--green); }
.answer-explain {
  background: var(--bg-2); border: 1px solid var(--border-0);

}
.answer-explain.show { display: block; }

/* ═══ SPEAKING ═══ */
.speak-sentence { font-size: 20px; font-weight: 600; line-height: 1.5; text-align: center; margin: 1rem 0; color: var(--text-0); letter-spacing: -.3px; }
.speak-trans { font-size: 13px; color: var(--text-3); text-align: center; margin-bottom: .75rem; font-style: italic; }
.mic-btn {
  width: 68px; height: 68px; border-radius: 50%; border: 2px solid var(--border-2);

  transition: all .2s; box-shadow: var(--sh-sm);
}

@keyframes mPulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)} 50%{box-shadow:0 0 0 12px rgba(248,113,113,0)} }
.score-bar { height: 8px; border-radius: 4px; background: var(--bg-4); overflow: hidden; margin: .5rem 0; }
.score-fill { height: 8px; border-radius: 4px; transition: width .8s cubic-bezier(.4,0,.2,1); }

/* ═══ WRITING ═══ */
.prompt-box {
  background: linear-gradient(135deg, rgba(79,142,247,.08), transparent);

}
.prompt-tag { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; font-weight: 600; font-family: var(--font-mono); }
.prompt-text { font-size: 14px; font-weight: 600; color: var(--text-0); line-height: 1.5; }
.prompt-vi { font-size: 12px; color: var(--text-3); margin-top: 5px; font-style: italic; }
.write-area {
  width: 100%; min-height: 90px; padding: .75rem; border-radius: var(--r-md);
  border: 1px solid var(--border-1); background: var(--bg-2);

}
.write-area:focus { border-color: var(--accent); }
.check-item {
  display: flex; align-items: center; gap: 9px; padding: .5rem .65rem;

}

/* ═══ READING ═══ */

}

.word-popup {

/* ═══ NOTE ═══ */
.note-area {

/* ═══ THEORY ═══ */
.theory-block {

}

}

.theory-body { display: none; border-top: 1px solid var(--border-0); }
.theory-hd.open + .theory-body { display: block; }
.theory-section { padding: .85rem 1rem; border-bottom: 1px solid var(--border-0); }
.theory-section:last-child { border-bottom: none; }
.ts-lbl { font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; font-family: var(--font-mono); }
.formula-box {
  background: var(--bg-0); border: 1px solid var(--border-1);
  border-radius: var(--r-sm); padding: .6rem .85rem;

}
.ex-box {
  background: var(--bg-2); border: 1px solid var(--border-0);
  border-radius: var(--r-sm); padding: .45rem .7rem; font-size: 13px;
  font-style: italic; margin: .3rem 0; border-left: 2px solid var(--border-2); color: var(--text-1);
}
.ex-box.good { border-left-color: var(--green); }
.ex-box.bad { border-left-color: var(--red); }
.ex-vi { font-size: 11px; color: var(--text-3); font-style: normal; margin-top: 3px; }
.tip-box {
  background: var(--amber-dim); border: 1px solid rgba(251,191,36,.2);
  border-radius: var(--r-sm); padding: .45rem .7rem;
  font-size: 12px; color: var(--amber); margin: .35rem 0; line-height: 1.6;
}
.danger-box {
  background: var(--red-dim); border: 1px solid rgba(248,113,113,.2);
  border-radius: var(--r-sm); padding: .45rem .7rem;
  font-size: 12px; color: var(--red); margin: .35rem 0; line-height: 1.6;
}
.good-box {
  background: var(--green-dim); border: 1px solid rgba(62,207,142,.2);
  border-radius: var(--r-sm); padding: .45rem .7rem;
  font-size: 12px; color: var(--green); margin: .35rem 0; line-height: 1.6;
}

/* ═══ PLACEMENT TEST ═══ */
.test-card {
  background: var(--bg-1); border: 1px solid var(--border-1);
  border-radius: var(--r-xl); padding: 1.25rem 1.15rem;
  margin-bottom: .75rem; box-shadow: var(--sh-md);
}
.test-lv { font-size: 11px; font-family: var(--font-mono); margin-bottom: .5rem; }
.test-q { font-size: 15px; font-weight: 500; color: var(--text-0); margin-bottom: .85rem; line-height: 1.5; }
.test-opts { display: flex; flex-direction: column; gap: 8px; }
.topt {
  padding: 11px 14px; border-radius: var(--r-md);
  border: 1px solid var(--border-1); background: var(--bg-2);
  font-size: 13.5px; cursor: pointer; text-align: left;
  font-family: var(--font-sans); color: var(--text-1); transition: all .15s; line-height: 1.4;
}
.topt:hover { border-color: var(--accent-glow); background: var(--accent-dim); color: var(--accent); }
.topt.ok { background: var(--green-dim); border-color: rgba(62,207,142,.3); color: var(--green); }
.topt.no { background: var(--red-dim); border-color: rgba(248,113,113,.3); color: var(--red); }
.topt.show { background: var(--green-dim); border-color: rgba(62,207,142,.3); color: var(--green); }

/* ═══ SETTINGS ═══ */
.setting-block {
  background: var(--bg-1); border: 1px solid var(--border-0);
  border-radius: var(--r-lg); padding: .9rem 1rem;
  margin-bottom: .75rem;
}
.setting-block-title { font-size: 13px; font-weight: 600; color: var(--text-0); margin-bottom: .75rem; }
.setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: .65rem; }
.setting-row:last-child { margin-bottom: 0; }
.setting-lbl { font-size: 13px; color: var(--text-2); }
.setting-note { font-size: 11px; color: var(--text-3); margin-top: .3rem; font-family: var(--font-mono); line-height: 1.5; }
.toggle-group { display: flex; background: var(--bg-2); border: 1px solid var(--border-1); border-radius: var(--r-sm); overflow: hidden; }
.tgl-btn { flex: 1; padding: 6px 10px; border: none; background: transparent; font-size: 12px; color: var(--text-2); cursor: pointer; font-family: var(--font-sans); transition: all .15s; white-space: nowrap; }
.tgl-btn.on { background: var(--accent); color: #fff; }

/* ═══ RESULT ═══ */
.result-box {
  background: var(--bg-1); border: 1px solid var(--border-0);
  border-radius: var(--r-xl); padding: 2rem 1rem; text-align: center;
  box-shadow: var(--sh-md);
}
.result-num { font-size: 56px; font-weight: 700; font-family: var(--font-mono); letter-spacing: -2px; }
.result-sub { font-size: 13px; color: var(--text-2); margin-top: 4px; font-family: var(--font-mono); }
.result-radar { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 1rem 0; }
.rr-cell { background: var(--bg-2); border: 1px solid var(--border-0); border-radius: var(--r-md); padding: .6rem .5rem; text-align: center; }
.rr-val { font-size: 18px; font-weight: 700; font-family: var(--font-mono); }
.rr-lbl { font-size: 10px; color: var(--text-3); margin-top: 2px; }

/* ═══ MICRO BANNER ═══ */
.micro-banner {
  background: linear-gradient(135deg, var(--accent-dim), var(--purple-dim));
  border: 1px solid var(--accent-glow); border-radius: var(--r-lg);
  padding: .85rem 1rem; display: flex; align-items: center;
  justify-content: space-between; margin-bottom: .75rem; cursor: pointer;
  transition: all .2s;
}
.micro-banner:hover { border-color: rgba(79,142,247,.5); }
.micro-txt { font-size: 13px; color: var(--text-0); font-weight: 600; }
.micro-sub { font-size: 11px; color: var(--text-2); margin-top: 2px; font-family: var(--font-mono); }
.micro-btn { background: var(--accent); border: none; border-radius: var(--r-sm); padding: 6px 12px; font-size: 12px; color: #fff; cursor: pointer; font-family: var(--font-sans); font-weight: 500; }

/* ═══ FLOAT / LVLUP / CONFETTI ═══ */
.float-fb { position: fixed; top: 38%; left: 50%; transform: translate(-50%,-50%); font-size: 18px; font-weight: 700; pointer-events: none; z-index: 999; opacity: 0; white-space: nowrap; font-family: var(--font-mono); }
.float-fb.show { animation: fup .9s ease forwards; }
@keyframes fup { 0%{opacity:0;transform:translate(-50%,-50%) scale(.6)} 15%{opacity:1;transform:translate(-50%,-65%) scale(1.08)} 70%{opacity:1;transform:translate(-50%,-85%)} 100%{opacity:0;transform:translate(-50%,-120%) scale(.9)} }
.lvlup-ov { position: fixed; inset: 0; background: rgba(0,0,0,.75); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity .3s; }
.lvlup-ov.show { opacity: 1; pointer-events: all; }
.lvlup-box { background: var(--bg-1); border: 1px solid var(--border-1); border-radius: var(--r-xl); padding: 2.5rem 2rem; text-align: center; box-shadow: var(--sh-lg), 0 0 80px var(--accent-glow); animation: popIn .4s cubic-bezier(.4,0,.2,1); max-width: 320px; width: 90%; }
@keyframes popIn { from{transform:scale(.65);opacity:0} to{transform:scale(1);opacity:1} }
.cp { position: fixed; pointer-events: none; z-index: 998; animation: cfall linear forwards; border-radius: 2px; }
@keyframes cfall { 0%{opacity:1;transform:translateY(-10px) rotate(0)} 100%{opacity:0;transform:translateY(100vh) rotate(720deg)} }

/* ═══ SRS DOTS ═══ */
.srs-dots { display: flex; gap: 3px; justify-content: center; flex-wrap: wrap; margin-bottom: .55rem; }
.srs-dot { width: 6px; height: 6px; border-radius: 50%; }
.d-new { background: var(--accent); }
.d-rev { background: var(--amber); }
.d-ok { background: var(--green); }

/* ═══ MORNING TEST BANNER ═══ */
.morning-banner {
  display: flex; align-items: center; gap: 12px;
  background: var(--purple-dim); border: 1px solid rgba(167,139,250,.2);

}

.morning-txt { flex: 1; }
.morning-title { font-size: 13px; font-weight: 600; color: var(--purple); }
.morning-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; font-family: var(--font-mono); }

/* ═══ PLACEMENT RESULT ═══ */
.placement-result {
  background: var(--bg-1); border: 1px solid var(--accent-glow);
  border-radius: var(--r-xl); padding: 1.5rem; margin-bottom: .75rem;

.pr-suggest-val { font-size: 16px; font-weight: 700; color: var(--text-0); }
</style>

<script>




// ═══════════ CONTENT DATA A1→C2 ═══════════
const PLACEMENT_QS=[
{q:"Ich ___ Peter. Wie heißt du?",opts:["bin","bist","ist","sind"],c:0,lv:"A1",ex:"sein 1.Sg: ich BIN"},
{q:"Was ist das? — Das ___ ein Buch.",opts:["bin","bist","ist","sind"],c:2,lv:"A1",ex:"sein 3.Sg: es/das IST"},

function sm2Update(card,q){
  let{interval=1,reps=0,ef=2.5,nextDue=Date.now()}=card||{};
  if(q<1){interval=1;reps=0;}
  else{if(reps===0)interval=1;else if(reps===1)interval=6;else interval=Math.round(interval*ef);reps++;ef=Math.max(1.3,ef+0.1-(3-q)*(0.08+(3-q)*0.02));}
  nextDue=Date.now()+interval*86400000;
  return{interval,reps,ef,nextDue};
}

  document.body.style.background=darkMode?'':'#f5f5f7';
  document.body.style.color=darkMode?'':'#1a1a1a';
  const btn=document.getElementById('darkToggle');
  if(btn)btn.innerHTML=darkMode?'☀️':'🌙';

function speak(txt,btn=null){
  try{if(!window.speechSynthesis)return;window.speechSynthesis.cancel();}catch(e){return;}
  if(btn&&btn.classList.contains('go')){btn.classList.remove('go');return;}
  document.querySelectorAll('.spk').forEach(b=>b.classList.remove('go'));
  const u=new SpeechSynthesisUtterance(txt);u.lang='de-DE';u.rate=0.87;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('de'));if(v)u.voice=v;
  if(btn){btn.classList.add('go');u.onend=u.onerror=()=>btn.classList.remove('go');}
  speechSynthesis.speak(u);
}

// ═════ PLAN CALC ═════
function calcPlan(){
  const fromIdx=LEVELS.indexOf(cfg.fromLv||'A0');const toIdx=LEVELS.indexOf(cfg.toLv||'A2');
  let totalHours=0;
  for(let i=fromIdx+1;i<=toIdx;i++)totalHours+=HOURS_PER_LEVEL[LEVELS[i]]||100;
  totalHours=Math.max(totalHours,10);
  if(cfg.inputMode==='hours'){cfg.totalDays=Math.ceil(totalHours/(parseFloat(cfg.hoursPerDay)||1));}
  else{cfg.hoursPerDay=+(totalHours/(parseInt(cfg.totalDays)||90)).toFixed(1);}
  const minsDayTotal=Math.round(parseFloat(cfg.hoursPerDay)*60);
  const studyLv=LEVELS[Math.min(fromIdx+1,LEVELS.length-1)];
  return{totalHours,minsDayTotal,studyLv};
}
function getDayNum(){return Math.max(1,Math.floor((Date.now()-(cfg.startDate||Date.now()))/86400000)+1);}
function getStudyLv(){const fromIdx=LEVELS.indexOf(cfg.fromLv||'A0');return LEVELS[Math.min(fromIdx+1,LEVELS.length-1)]||'A1';}

function addXP(amt){
  const g=amt*combo;xp+=g;txp+=g;let up=false;
  while(lv<LV_LIST.length-1&&xp>=LV_LIST[lv].xp){xp-=LV_LIST[lv].xp;lv++;up=true;}
  saveAll();updateTopUI();if(up)setTimeout(showLvlUp,500);return g;
}
function updateTopUI(){
  const L=LV_LIST[lv];const pct=Math.min(100,Math.round(xp/L.xp*100));
  document.getElementById('xpBar').style.width=pct+'%';
  document.getElementById('xpNum').textContent=`${xp}/${L.xp}`;
  document.getElementById('lvTag').textContent=`${L.e} Cấp ${lv+1}`;
  const sp=document.getElementById('streakTag');sp.textContent=`🔥 ${streak}`;sp.classList.toggle('hot',streak>=3);
  document.getElementById('comboTag').textContent=`⚡ ×${combo}`;
  document.getElementById('targetTag').textContent=`🎯 ${cfg.toLv}`;
  const dayNum=getDayNum();
  document.getElementById('dayTag').textContent=`📅 ${dayNum}/${cfg.totalDays||90}`;
  document.getElementById('txpTag').textContent=`✨ ${txp} XP`;
  // Update dark toggle
  const dt=document.getElementById('darkToggle');if(dt)dt.textContent=darkMode?'☀️':'🌙';
}
function showLvlUp(){
  const L=LV_LIST[lv];
  document.getElementById('luE').textContent=L.e;document.getElementById('luT').textContent=`Lên cấp ${lv+1}!`;document.getElementById('luS').textContent=L.nm+' · Nhấn để tiếp';
  document.getElementById('lvlupOv').classList.add('show');confetti();
}
function closeLvlUp(){document.getElementById('lvlupOv').classList.remove('show');}

function trackProgress(skill, isCorrect){
  if(!session._answers) session._answers={correct:0,total:0};
  session._answers.total++;
  if(isCorrect) session._answers.correct++;
  if(!sessionProgress[skill]) sessionProgress[skill]={correct:0,total:0};
  sessionProgress[skill].total++;
  if(isCorrect) sessionProgress[skill].correct++;
  saveAll();
}
function getSessionStat(skill){
  const sp=sessionProgress[skill]||{correct:0,total:0};
  return{...sp, pct:sp.total>0?Math.round(sp.correct/sp.total*100):0, done:sp.total>=(SESSION_MIN[skill]||3)&&(sp.total>0?sp.correct/sp.total>=SESSION_PASS:false)};
}

function onOk(skill,xpAmt=10){
  streak++;if(streak>best)best=streak;combo=streak>=10?4:streak>=5?3:streak>=3?2:1;
  updateAcc(skill,true);const g=addXP(xpAmt);trackProgress(skill,true);
  showFloat(OK[~~(Math.random()*OK.length)]+` +${g}XP${combo>1?' ×'+combo+'!':''}`, 'var(--green)');
  if([5,10,20].includes(streak))confetti();
}
function onNo(skill,word=''){
  streak=0;combo=1;updateAcc(skill,false);trackProgress(skill,false);
  if(word){const e=errLog.find(x=>x.w===word);if(e)e.n++;else errLog.unshift({w:word,skill,n:1});errLog=errLog.slice(0,30);}
  saveAll();updateTopUI();showFloat(NO[~~(Math.random()*NO.length)],'var(--red)');
}
function updateAcc(skill,ok){const n=accN[skill]||0;acc[skill]=Math.round((acc[skill]*n+(ok?100:0))/(n+1));accN[skill]=n+1;saveAll();}
function weakSkills(){return Object.keys(acc).filter(k=>accN[k]>=3&&acc[k]<65);}

// ═════ DAILY PLAN ═════
function buildDailyPlan(){
  const today=todayStr();
  if(dailyDate===today&&daily)return daily;
  sessionProgress={};
  const weak=weakSkills();const plan=calcPlan();const studyLv=plan.studyLv;
  const minsTotal=plan.minsDayTotal;
  const base={theory:Math.round(minsTotal*.22),vocab:Math.round(minsTotal*.20),grammar:Math.round(minsTotal*.20),listen:Math.round(minsTotal*.15),speak:Math.round(minsTotal*.10),write:Math.round(minsTotal*.07),read:Math.round(minsTotal*.06)};
  weak.forEach(sk=>{if(base[sk])base[sk]=Math.min(base[sk]+5,20);});
  const items=[
    {skill:'theory',icon:'📖',label:'Lý thuyết',sub:`Ngữ pháp ${studyLv}`,mins:base.theory,weak:false},
    {skill:'vocab',icon:'📚',label:'Từ vựng SRS',sub:`${studyLv} · ${SESSION_MIN.vocab} thẻ tối thiểu`,mins:base.vocab,weak:weak.includes('vocab')},
    {skill:'grammar',icon:'📐',label:'Ngữ pháp',sub:`Bài tập · ${SESSION_MIN.grammar} câu tối thiểu`,mins:base.grammar,weak:weak.includes('grammar')},
    {skill:'listen',icon:'👂',label:'Nghe hiểu',sub:`Goethe/Telc · ${SESSION_MIN.listen} bài`,mins:base.listen,weak:weak.includes('listen')},
    {skill:'speak',icon:'🗣️',label:'Luyện nói',sub:'Roleplay giám khảo',mins:base.speak,weak:weak.includes('speak')},
    {skill:'write',icon:'✍️',label:'Luyện viết',sub:'Rubric Goethe/Telc',mins:base.write,weak:weak.includes('write')},
    {skill:'read',icon:'📖',label:'Đọc hiểu',sub:`Goethe/Telc · ${SESSION_MIN.read} bài`,mins:base.read,weak:weak.includes('read')},
  ];
  daily={date:today,studyLv,items,totalMins:Object.values(base).reduce((a,b)=>a+b,0)};
  dailyDate=today;saveAll();return daily;
}

  const sp=getSessionStat('vocab');

  document.getElementById('vStat').textContent=sp.total>0?`${sp.correct}/${sp.total} đúng (${sp.pct}%)  ${sp.done?'✓ ĐẠT':''}` :'';
  document.getElementById('vStat').style.color=sp.done?'var(--green)':sp.pct>=60?'var(--amber)':'var(--text-3)';
  document.getElementById('vDots').innerHTML=cards.map((_,i)=>{const r=(srsV[`${s.lv}_v_${i}`]||{}).reps||0;return`<div class="srs-dot ${r>=3?'d-ok':r>0?'d-rev':'d-new'}"></div>`;}).join('');
  const wf=c.art?c.art+' '+c.w:c.w;const s1h=hl(c.s1,c.w);const s2h=hl(c.s2,c.w);
  const s1e=(c.s1||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");const s2e=(c.s2||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");const wfe=wf.replace(/'/g,"\\'");
  const nextOn=sd.nextDue?new Date(sd.nextDue).toLocaleDateString('vi'):'chưa học';
  document.getElementById('vArea').innerHTML=`

function flipV(){
  document.getElementById('vFront').style.display='none';document.getElementById('vBack').style.display='block';
  document.getElementById('vBtns').innerHTML=`<button class="btn btn-correct" onclick="nextV(2)">✓ Nhớ rõ</button><button class="btn btn-hard" onclick="nextV(1)">~ Lờ mờ</button><button class="btn btn-wrong" onclick="nextV(0)">✗ Không nhớ</button>`;
}
function nextV(q){
  const s=session;const ci=s.queue[s.idx];const key=`${s.lv}_v_${ci}`;
  srsV[key]=sm2Update(srsV[key]||{},q);
  if(q>=1){s.correct++;onOk('vocab',q===2?10:5);}else{s.wrong++;onNo('vocab',(VOCAB[s.lv]||[])[ci]?.w||'');}
  saveAll();s.idx++;renderVCard();
}

// ═════ GRAMMAR (with explain always + random pool) ═════
function startGrammar(){
  const lv2=getStudyLv();
  const pool=getGrammarPool(lv2);
  // Fresh random order each time, never repeat same card in same session
  const queue=shuf(pool.map((_,i)=>i));
  session={type:'grammar',queue,pool,idx:0,correct:0,wrong:0,lv:lv2,mode:'fill',answered:false,usedIds:new Set()};
  renderGrammarSession();
}
function renderGrammarSession(){
  const lv2=session.lv||getStudyLv();
  const el=document.getElementById('p-grammar');
  el.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:.85rem;flex-wrap:wrap">
    <button class="btn btn-ghost btn-sm" onclick="go('home')">← Về</button>
    <div class="h2">📐 Ngữ pháp ${lv2}</div>
    <div style="margin-left:auto;display:flex;gap:4px">
      <button class="btn btn-sm${session.mode==='fill'?' btn-primary':' btn-ghost'}" onclick="session.mode='fill';session.idx=0;session.queue=shuf(session.queue);session.answered=false;renderGrammarSession()">Điền</button>
      <button class="btn btn-sm${session.mode==='order'?' btn-primary':' btn-ghost'}" onclick="session.mode='order';session.idx=0;session.queue=shuf(session.queue);session.answered=false;renderGrammarSession()">Sắp xếp</button>
      <button class="btn btn-sm btn-ghost" onclick="startTheory()">📖 Lý thuyết</button>
    </div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem">
    <span class="label" id="gCtr">—</span>
    <span style="font-size:11px;font-family:var(--font-mono)" id="gStat"></span>
  </div>
  <div style="height:6px;background:var(--bg-4);border-radius:3px;margin-bottom:.6rem;overflow:hidden;position:relative">
    <div id="gProgA" style="position:absolute;top:0;left:0;height:6px;border-radius:3px;background:var(--accent);opacity:.3;transition:width .4s"></div>
    <div id="gProgG" style="position:absolute;top:0;left:0;height:6px;border-radius:3px;background:var(--green);transition:width .4s"></div>
  </div>
  <div id="gArea"></div><div class="btn-row" id="gBtns"></div><div id="gRes"></div>`;
  renderGCard();
}
function updateGrammarProgress(){
  const sp=getSessionStat('grammar');
  const progBase=Math.min(100,Math.round(sp.total/SESSION_MIN.grammar*100));
  document.getElementById('gProgA').style.width=progBase+'%';
  document.getElementById('gProgG').style.width=Math.min(progBase,sp.pct)+'%';
  document.getElementById('gStat').textContent=sp.total>0?`${sp.correct}/${sp.total} đúng (${sp.pct}%) ${sp.done?'✓ ĐẠT':''}` :'';
  document.getElementById('gStat').style.color=sp.done?'var(--green)':sp.pct>=60?'var(--amber)':'var(--text-3)';
}
function renderGCard(){
  const s=session;const pool=s.pool||getGrammarPool(s.lv);
  if(s.idx>=s.queue.length){checkSessionPass('grammar','gRes','gArea','gBtns',()=>startGrammar());return;}
  const ci=s.queue[s.idx];const c=pool[ci];if(!c){s.idx++;renderGCard();return;}
  updateGrammarProgress();
  document.getElementById('gCtr').textContent=`${s.idx+1}/${s.queue.length}`;
  s.answered=false;
  if(s.mode==='fill')renderGFill(c,ci);else renderGOrder(c,ci);
}
function renderGFill(c,ci){
  if(!c.fill){session.idx++;renderGCard();return;}
  const t=c.theory;const pts=c.fill.s.split('___');
  document.getElementById('gArea').innerHTML=`<div class="card">
    <div class="g-context"><div class="g-ctx-title">${c.title}</div>${t?`<div class="g-ctx-formula mono" style="font-size:11px">${t.formula?t.formula.split('\n')[0]:''}</div>`:''}</div>
    <div class="g-sentence">${pts[0]}<input class="g-blank" id="gInp" placeholder="___" autocomplete="off" onkeydown="if(event.key==='Enter')checkGF(${ci})">${pts[1]||''}</div>
    <div style="font-size:11px;color:var(--text-3);text-align:center;font-family:var(--font-mono)">💡 ${c.fill.hint}</div>
    <div class="g-reveal" id="gRev"></div>
    <div class="answer-explain" id="gExp"></div>
  </div>`;
  document.getElementById('gBtns').innerHTML=`<button class="btn btn-primary" onclick="checkGF(${ci})">Kiểm tra →</button>`;
  setTimeout(()=>document.getElementById('gInp')?.focus(),80);
}
function checkGF(ci){
  const s=session;const pool=s.pool||getGrammarPool(s.lv);const c=pool[ci];
  const inp=document.getElementById('gInp');if(!inp||inp.disabled)return;
  if(s.answered)return;s.answered=true;
  const ok=inp.value.trim().toLowerCase()===c.fill.ans.toLowerCase();
  inp.classList.add(ok?'ok':'no');inp.disabled=true;
  const rev=document.getElementById('gRev');rev.textContent=ok?`✓ ${c.fill.ans}`:`✗ Đáp án đúng: ${c.fill.ans}`;rev.style.color=ok?'var(--green)':'var(--red)';
  // ALWAYS show explanation
  const exp=document.getElementById('gExp');exp.classList.add('show');
  const explainText=c.explain||c.fill?.hint||'';
  const exampleText=c.theory?.examples?.[0]?`<br><span style="color:var(--accent)">→ ${c.theory.examples[0].de}</span> <span style="color:var(--text-3)">(${c.theory.examples[0].vi})</span>`:'';
  exp.innerHTML=`<strong>${c.title}:</strong> ${explainText}${exampleText}`;
  const key=`${s.lv}_g_${ci}`;srsG[key]=sm2Update(srsG[key]||{},ok?2:0);
  if(ok){s.correct++;onOk('grammar',12);}else{s.wrong++;onNo('grammar',c.title);}
  saveAll();updateGrammarProgress();
  document.getElementById('gBtns').innerHTML=`<button class="btn ${ok?'btn-correct':'btn-wrong'}" onclick="session.idx++;session.answered=false;renderGCard()">Tiếp →</button>`;
}
function renderGOrder(c,ci){
  if(!c.order){session.idx++;renderGCard();return;}
  woSel=[];const words=shuf([...c.order.words]);
  document.getElementById('gArea').innerHTML=`<div class="card">
    <div class="g-context"><div class="g-ctx-title">${c.title}</div></div>
    <div class="label" style="text-align:center;margin:.4rem 0">Sắp xếp thành câu đúng:</div>
    <div class="wo-slots" id="woSl"></div>
    <div class="wo-chips">${words.map((w,i)=>`<button class="wo-chip" id="woc${i}" onclick="selWO('${w.replace(/'/g,"\\'")}',${i})">${w}</button>`).join('')}</div>
    <div class="g-reveal" id="gRev"></div><div class="answer-explain" id="gExp"></div>
  </div>`;
  document.getElementById('gBtns').innerHTML=`
    <button class="btn btn-ghost btn-sm" onclick="woSel=[];document.querySelectorAll('.wo-chip').forEach(c=>c.classList.remove('used'));document.getElementById('woSl').innerHTML=''">↺ Xóa</button>
    <button class="btn btn-primary" onclick="checkGO(${ci})">Kiểm tra →</button>`;
}
function selWO(w,idx){
  const ch=document.getElementById('woc'+idx);if(ch.classList.contains('used'))return;
  ch.classList.add('used');woSel.push({w,idx});
  const sl=document.createElement('button');sl.className='wo-slot';sl.textContent=w;
  sl.onclick=()=>{ch.classList.remove('used');woSel=woSel.filter(x=>x.idx!==idx);sl.remove();};
  document.getElementById('woSl').appendChild(sl);
}
function checkGO(ci){
  const s=session;const pool=s.pool||getGrammarPool(s.lv);const c=pool[ci];
  const ok=woSel.map(x=>x.w).join(' ').toLowerCase()===(c.order.ans||[]).join(' ').toLowerCase();
  const rev=document.getElementById('gRev');rev.textContent=ok?'✓ Chính xác!':'✗ Đúng: '+c.order.ans.join(' ');rev.style.color=ok?'var(--green)':'var(--red)';
  const exp=document.getElementById('gExp');exp.classList.add('show');
  exp.innerHTML=`<strong>Giải thích:</strong> ${c.explain||c.fill?.hint||c.title}`;
  srsG[`${s.lv}_g_${ci}`]=sm2Update(srsG[`${s.lv}_g_${ci}`]||{},ok?2:0);
  if(ok){s.correct++;onOk('grammar',15);}else{s.wrong++;onNo('grammar',c.title);}
  saveAll();updateGrammarProgress();
  document.getElementById('gBtns').innerHTML=`<button class="btn ${ok?'btn-correct':'btn-wrong'}" onclick="session.idx++;session.answered=false;renderGCard()">Tiếp →</button>`;
}

// ═════ CHECK SESSION PASS + RETRY ═════
function checkSessionPass(skill,resId,areaId,btnsId,retryFn){
  const sp=getSessionStat(skill);
  const elA=document.getElementById(areaId);if(elA)elA.innerHTML='';
  const elB=document.getElementById(btnsId);if(elB)elB.innerHTML='';
  const elR=document.getElementById(resId);if(!elR)return;
  if(sp.done){
    // PASSED
    if(sp.pct>=80)confetti();
    elR.innerHTML=`<div class="result-box">
      <div class="result-num" style="color:${sp.pct>=80?'var(--green)':'var(--accent)'}">${sp.pct}%</div>
      <div class="result-sub">${sp.correct}/${sp.total} đúng · 🔥 ${streak}</div>
      <div style="color:var(--green);font-size:13px;font-weight:600;margin:.5rem 0">✅ Kỹ năng hoàn thành!</div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="go('home')">Về tổng quan ✓</button>
        <button class="btn btn-ghost" onclick="${retryFn.name}()">Luyện thêm ↻</button>
      </div>
    </div>`;
  } else {
    // FAILED — show retry with different questions
    elR.innerHTML=`<div class="result-box">
      <div class="result-num" style="color:var(--amber)">${sp.pct}%</div>
      <div class="result-sub">${sp.correct}/${sp.total} đúng · Cần ≥${Math.round(SESSION_PASS*100)}% để đạt</div>
      <div style="color:var(--amber);font-size:13px;font-weight:600;margin:.5rem 0">⚠️ Chưa đạt — thử bài mới để luyện thêm!</div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="${retryFn.name}()">🔀 Bài mới (random) →</button>
        <button class="btn btn-ghost btn-sm" onclick="startTheory()">📖 Xem lý thuyết</button>
      </div>
    </div>`;
  }
}

function startListen(){
  const lv2=getStudyLv();const exs=LISTEN[lv2]||[];
  session={type:'listen',lv:lv2,exIdx:0,qIdx:0,correct:0,wrong:0,answered:false,queue:shuf(exs.map((_,i)=>i))};
  const el=document.getElementById('p-listen');
  el.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:.85rem"><button class="btn btn-ghost btn-sm" onclick="go('home')">← Về</button><div class="h2">👂 Nghe ${lv2}</div><span style="font-size:11px;color:var(--green);font-family:var(--font-mono);margin-left:auto" id="lStat"></span></div>
    <div style="height:6px;background:var(--bg-4);border-radius:3px;margin-bottom:.6rem;overflow:hidden"><div id="lBar" style="height:6px;border-radius:3px;background:var(--accent);width:0%;transition:width .4s"></div></div>
    <div id="lArea"></div><div class="btn-row" id="lBtns"></div><div id="lRes"></div>`;
  renderLCard();
}
function renderLCard(){
  const s=session;const exs=LISTEN[s.lv]||[];
  const sp=getSessionStat('listen');
  document.getElementById('lBar').style.width=Math.min(100,Math.round(sp.total/SESSION_MIN.listen*100))+'%';
  document.getElementById('lBar').style.background=sp.done?'var(--green)':'var(--accent)';
  document.getElementById('lStat').textContent=sp.total>0?`${sp.correct}/${sp.total} (${sp.pct}%) ${sp.done?'✓':''}` :'';
  if(s.exIdx>=exs.length){checkSessionPass('listen','lRes','lArea','lBtns',startListen);return;}
  const ex=exs[s.exIdx];if(!ex){s.exIdx++;renderLCard();return;}
  const passage=ex.passages[s.qIdx];if(!passage){s.exIdx++;s.qIdx=0;renderLCard();return;}
  s.answered=false;
  const pe=passage.text.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  document.getElementById('lArea').innerHTML=`<div class="card">
    <div class="label" style="margin-bottom:.3rem">${ex.title}</div>
    <div style="font-size:12px;color:var(--text-3);margin-bottom:.5rem">${ex.instructions}</div>
    <div style="font-size:11px;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-glow);border-radius:var(--r-sm);padding:.4rem .7rem;margin-bottom:.4rem">💡 Nghe ít nhất 2 lần!</div>
    <button class="listen-btn" onclick="listenText('${pe}',this)">${SPK} <span>Nghe bài</span></button>
    <div style="font-size:13px;font-weight:500;color:var(--text-0);margin:.6rem 0">${passage.q}</div>
    <div class="mcq">${passage.opts.map((o,i)=>`<button class="mopt" onclick="checkL(${i},${passage.c},'${passage.explain.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')"> ${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
    <div class="answer-explain" id="lExp"></div>
  </div>`;
  document.getElementById('lBtns').innerHTML='';
}
function listenText(text,btn){btn.classList.toggle('playing');speak(text,null);}
function checkL(chosen,correct,explain){
  const s=session;if(s.answered)return;s.answered=true;
  document.querySelectorAll('.mopt').forEach((b,i)=>{b.disabled=true;if(i===chosen)b.classList.add(chosen===correct?'ok':'no');if(i===correct&&chosen!==correct)b.classList.add('show');});
  const exp=document.getElementById('lExp');exp.classList.add('show');exp.innerHTML=`<strong>Giải thích:</strong> ${explain}`;
  const ok=chosen===correct;
  if(ok){s.correct++;onOk('listen',8);}else{s.wrong++;onNo('listen');}
  const exs=LISTEN[s.lv]||[];const ex=exs[s.exIdx];const hasMore=s.qIdx<(ex?.passages?.length||1)-1;
  document.getElementById('lBtns').innerHTML=`<button class="btn ${ok?'btn-correct':'btn-wrong'}" onclick="${hasMore?'session.qIdx++;renderLCard()':'session.exIdx++;session.qIdx=0;renderLCard()'}">${hasMore?'Câu tiếp →':'Bài tiếp →'}</button>`;
}

function startSpeak(){

    <div style="background:var(--accent-dim);border:1px solid var(--accent-glow);border-radius:var(--r-md);padding:.65rem .85rem;margin-bottom:.75rem;font-size:12px;color:var(--accent)">${sk.intro}</div>
    <div style="height:6px;background:var(--bg-4);border-radius:3px;margin-bottom:.6rem;overflow:hidden"><div id="sBar" style="height:6px;border-radius:3px;background:var(--accent);width:0%;transition:width .4s"></div></div>
    <div id="sArea"></div><div class="btn-row" id="sBtns"></div><div id="sRes"></div>`;

let sRubricSet=new Set();
function renderSCard(){
  const s=session;const parts=s.sk.parts;
  if(s.partIdx>=parts.length){checkSessionPass('speak','sRes','sArea','sBtns',startSpeak);return;}
  const part=parts[s.partIdx];
  document.getElementById('sBar').style.width=`${(s.partIdx+1)/parts.length*100}%`;
  const qe=(part.question||part.prompt||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  document.getElementById('sArea').innerHTML=`<div class="card" style="text-align:center">
    <div style="font-size:11px;color:var(--text-3);margin-bottom:.75rem">${part.type==='dialog'?'👤 '+part.role+' hỏi:':'📝 Bài tập:'}</div>
    <div class="speak-sentence">"${part.question||part.prompt||''}"</div>
    <div class="tip-box" style="text-align:left;margin:.75rem 0">💡 ${part.hint}</div>
    <button class="spk" style="margin-bottom:.75rem" onclick="speak('${qe}',this)">${SPK} Nghe câu hỏi</button>
    <button class="mic-btn" id="micB" onclick="toggleSpeakMic()">🎤</button>
    <div style="font-size:11px;color:var(--text-3);margin:.3rem 0" id="micLbl">Nhấn mic và trả lời bằng tiếng Đức</div>
    <div class="listen-transcript" id="sBox">—</div>
    <div id="sScore"></div>
    <div id="goetheRubric" style="display:none;margin-top:.75rem;text-align:left">
      <div class="label" style="margin-bottom:.35rem">📋 Rubric Goethe/Telc — Tự đánh giá</div>
      ${['Phát âm rõ ràng, dễ hiểu','Trả lời đúng vào câu hỏi','Dùng đúng ngữ pháp cơ bản','Câu trả lời đủ dài (≥2 câu)','Không dừng quá 5 giây'].map((r,i)=>`<div class="check-item" id="sr${i}" onclick="toggleSRubric(${i})"><div class="cbox" id="srcb${i}"></div><div class="clbl">${r}</div></div>`).join('')}
      <div style="font-size:11px;color:var(--text-3);margin-top:.4rem;font-family:var(--font-mono)" id="sRubricScore"></div>
    </div>
  </div>`;
  sRubricSet=new Set();
  document.getElementById('sBtns').innerHTML=`<button class="btn btn-ghost btn-sm" onclick="session.wrong++;onNo('speak');session.partIdx++;renderSCard()">Bỏ qua →</button>`;
}
function toggleSRubric(i){
  if(sRubricSet.has(i))sRubricSet.delete(i);else sRubricSet.add(i);
  document.getElementById('sr'+i)?.classList.toggle('done',sRubricSet.has(i));
  document.getElementById('srcb'+i).textContent=sRubricSet.has(i)?'✓':'';
  const score=document.getElementById('sRubricScore');if(score)score.textContent=`${sRubricSet.size}/5 tiêu chí · ${Math.round(sRubricSet.size/5*100)}%`;
}
function toggleSpeakMic(){
  const s=session;
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){showFloat('Cần Chrome để dùng mic!');return;}
  if(s.recing){if(s.recog)s.recog.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  s.recog=new SR();s.recog.lang='de-DE';s.recog.continuous=false;s.recog.interimResults=true;
  const mb=document.getElementById('micB'),lbl=document.getElementById('micLbl');
  s.recing=true;if(mb)mb.classList.add('rec');if(lbl)lbl.textContent='Đang nghe...';
  s.recog.onresult=e=>{const t=Array.from(e.results).map(r=>r[0].transcript).join('');const sb=document.getElementById('sBox');if(sb)sb.textContent=t;if(e.results[e.results.length-1].isFinal)showSpeakFeedback(t);};
  s.recog.onerror=s.recog.onend=()=>{s.recing=false;if(mb)mb.classList.remove('rec');if(lbl)lbl.textContent='Nhấn mic để thử lại';};
  s.recog.start();
}
function showSpeakFeedback(transcript){
  const s=session;const sc=document.getElementById('sScore');if(!sc)return;
  const words=transcript.split(' ').filter(w=>w.length>0).length;const ok=words>=4;
  sc.innerHTML=`<div class="score-bar" style="margin:.5rem 0"><div class="score-fill" style="width:${ok?80:40}%;background:${ok?'var(--green)':'var(--amber)'}"></div></div>
    <div style="font-size:12px;color:var(--text-2)">${ok?'✓ Câu trả lời đủ!':'↻ Thử nói dài hơn'}</div>`;
  const rubricDiv=document.getElementById('goetheRubric');if(rubricDiv)rubricDiv.style.display='block';
  if(ok){s.correct++;onOk('speak',12);}else onNo('speak');
  document.getElementById('sBtns').innerHTML=`<button class="btn ${ok?'btn-correct':'btn-hard'}" onclick="session.partIdx++;sRubricSet=new Set();renderSCard()">Phần tiếp →</button>`;
}

// ═════ WRITE ═════
function startWrite(){
  const lv2=getStudyLv();const ps=WRITE_PROMPTS[lv2]||[];
  session={type:'write',queue:shuf(ps.map((_,i)=>i)),idx:0,correct:0,lv:lv2};
  const el=document.getElementById('p-write');
  el.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:.85rem"><button class="btn btn-ghost btn-sm" onclick="go('home')">← Về</button><div class="h2">✍️ Viết ${lv2}</div></div>
    <div style="height:6px;background:var(--bg-4);border-radius:3px;margin-bottom:.6rem;overflow:hidden"><div id="wBar" style="height:6px;border-radius:3px;background:var(--accent);width:0%;transition:width .4s"></div></div>
    <div id="wArea"></div><div class="btn-row" id="wBtns"></div><div id="wRes"></div>`;
  renderWCard();
}
function renderWCard(){
  const s=session;const ps=WRITE_PROMPTS[s.lv]||[];
  if(s.idx>=s.queue.length){checkSessionPass('write','wRes','wArea','wBtns',startWrite);return;}
  const ci=s.queue[s.idx];const p=ps[ci];if(!p){s.idx++;renderWCard();return;}
  document.getElementById('wBar').style.width=`${(s.idx+1)/s.queue.length*100}%`;
  wChecked=new Set();
  const rubricItems=getWriteRubric(s.lv,p);
  document.getElementById('wArea').innerHTML=`<div class="card">
    <div class="prompt-box">
      <div class="prompt-tag">✍️ Aufgabe · Goethe ${s.lv}</div>
      <div class="prompt-text">${p.p.replace(/\n/g,'<br>')}</div>
      <div class="prompt-vi">${p.vi}</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><div class="label">Bài viết</div><div id="wWordCount" style="font-size:11px;color:var(--text-3);font-family:var(--font-mono)">0 từ</div></div>
    <textarea class="write-area" id="wTxt" placeholder="Schreib auf Deutsch..." oninput="updateWCount()"></textarea>
    <div class="label" style="margin:.75rem 0 .4rem">📋 Rubric Goethe/Telc:</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:.5rem">
      ${rubricItems.map((r,i)=>`<div class="check-item" id="rc${i}" onclick="toggleWC(${i})"><div class="cbox" id="rcb${i}"></div><div style="font-size:12px;color:var(--text-2);line-height:1.3">${r.label}</div></div>`).join('')}
    </div>
    <div style="background:var(--bg-2);border-radius:8px;padding:.5rem .7rem;margin-bottom:.5rem">
      <div id="rubricScore" style="font-size:12px;color:var(--text-3);font-family:var(--font-mono)">0/${rubricItems.length} tiêu chí · 0%</div>
      <div style="height:4px;background:var(--bg-4);border-radius:2px;margin-top:4px;overflow:hidden"><div id="rubricFill" style="height:4px;border-radius:2px;background:var(--accent);width:0%;transition:width .3s"></div></div>
    </div>
  </div>`;
  document.getElementById('wBtns').innerHTML=`<button class="btn btn-primary" onclick="submitW()">Nộp bài →</button>`;
}
function getWriteRubric(lv,p){
  const r={A2:[{label:'📧 Định dạng email đúng',pts:2},{label:'① Điểm nội dung 1',pts:3},{label:'② Điểm nội dung 2',pts:3},{label:'③ Điểm nội dung 3',pts:3},{label:'📏 ≥50 từ',pts:2},{label:'🔤 Ngữ pháp đúng',pts:3}],B1:[{label:'📋 Betreff đúng',pts:1},{label:'✉️ Sehr geehrte/r...',pts:1},{label:'✉️ Mit freundlichen Grüßen',pts:1},{label:'① Điểm nội dung 1',pts:3},{label:'② Điểm nội dung 2',pts:3},{label:'③ Điểm nội dung 3',pts:3},{label:'🎭 Ngôn ngữ lịch sự',pts:2},{label:'📏 ≥100 từ',pts:2}],B2:[{label:'🏗️ Einleitung rõ ràng',pts:2},{label:'💡 2+ lập luận có VD',pts:4},{label:'⚖️ Gegenargument',pts:3},{label:'🔚 Fazit/Kết luận',pts:2},{label:'🔗 Relativsatz dùng đúng',pts:2},{label:'📏 ≥150 từ',pts:2}]};
  return r[lv]||(p.checks||[]).map(l=>({label:l,pts:2}));
}
function updateWCount(){
  const ta=document.getElementById('wTxt');if(!ta)return;
  const wc=ta.value.trim().split(/\s+/).filter(w=>w.length>0).length;
  const el=document.getElementById('wWordCount');if(el)el.textContent=`${wc} từ`;
}
function toggleWC(i){
  if(wChecked.has(i))wChecked.delete(i);else wChecked.add(i);
  document.getElementById('rc'+i)?.classList.toggle('done',wChecked.has(i));
  const box=document.getElementById('rcb'+i);if(box)box.textContent=wChecked.has(i)?'✓':'';
  const s=session;const p=(WRITE_PROMPTS[s.lv]||[])[s.queue?.[s.idx]];
  const total=getWriteRubric(s.lv,p).length;const pct=Math.round(wChecked.size/total*100);
  const rs=document.getElementById('rubricScore');if(rs)rs.textContent=`${wChecked.size}/${total} · ${pct}%`;
  const rf=document.getElementById('rubricFill');if(rf){rf.style.width=pct+'%';rf.style.background=pct>=75?'var(--green)':pct>=50?'var(--accent)':'var(--amber)';}
}
function submitW(){
  const s=session;const p=(WRITE_PROMPTS[s.lv]||[])[s.queue?.[s.idx]];
  const txt=(document.getElementById('wTxt')||{}).value||'';
  if(txt.trim().length<10){showFloat('Hãy viết ít nhất một câu!');return;}
  const total=getWriteRubric(s.lv,p).length;const sc=wChecked.size;const pct=total?Math.round(sc/total*100):0;
  const col=pct>=75?'var(--green-dim)':pct>=50?'var(--amber-dim)':'var(--red-dim)';
  const tcol=pct>=75?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
  const msg=document.createElement('div');
  msg.style.cssText=`background:${col};border-radius:var(--r-md);padding:.65rem 1rem;text-align:center;font-size:13px;margin-top:.5rem;font-weight:600;color:${tcol}`;
  msg.textContent=`${sc}/${total} tiêu chí · ${pct>=75?'Xuất sắc! 🎉':pct>=50?'Khá ổn! 💪':'Cần ôn thêm! 📖'}`;
  document.getElementById('wArea').appendChild(msg);
  const passed=pct>=50;
  if(passed){s.correct++;addXP(sc*8);onOk('write',sc*4);}else onNo('write');
  updateAcc('write',passed);saveAll();
  document.getElementById('wBtns').innerHTML=`<button class="btn btn-primary" onclick="session.idx++;renderWCard()">Bài tiếp →</button>`;
}

// ═════ READ ═════
function startRead(){
  const lv2=getStudyLv();const ts=READ_TEXTS[lv2]||[];
  session={type:'read',queue:shuf(ts.map((_,i)=>i)),idx:0,qIdx:0,correct:0,wrong:0,lv:lv2,answered:false};
  const el=document.getElementById('p-read');
  el.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:.85rem"><button class="btn btn-ghost btn-sm" onclick="go('home')">← Về</button><div class="h2">📖 Đọc ${lv2}</div><span id="rStat" style="font-size:11px;color:var(--green);font-family:var(--font-mono);margin-left:auto"></span></div>
    <div style="height:6px;background:var(--bg-4);border-radius:3px;margin-bottom:.6rem;overflow:hidden"><div id="rBar" style="height:6px;border-radius:3px;background:var(--accent);width:0%;transition:width .4s"></div></div>
    <div id="rArea"></div><div class="btn-row" id="rBtns"></div><div id="rRes"></div>`;
  renderRCard();
}
function renderRCard(){
  const s=session;const ts=READ_TEXTS[s.lv]||[];const sp=getSessionStat('read');
  document.getElementById('rBar').style.width=Math.min(100,Math.round(sp.total/SESSION_MIN.read*100))+'%';
  document.getElementById('rBar').style.background=sp.done?'var(--green)':'var(--accent)';
  document.getElementById('rStat').textContent=sp.total>0?`${sp.pct}% ${sp.done?'✓':''}` :'';
  if(s.idx>=ts.length){checkSessionPass('read','rRes','rArea','rBtns',startRead);return;}
  const ci=s.queue[s.idx];const art=ts[ci];if(!art){s.idx++;renderRCard();return;}
  const q=art.questions[s.qIdx];if(!q){s.idx++;s.qIdx=0;renderRCard();return;}
  s.answered=false;
  const tappable=art.text.split(' ').map(w=>`<span class="read-word" onclick="tapW('${w.replace(/[.,!?]/g,'').replace(/'/g,"\\'")}')">${w}</span>`).join(' ');
  document.getElementById('rArea').innerHTML=`<div class="card">
    <div class="label" style="margin-bottom:.4rem">${art.title}</div>
    <div style="font-size:11px;color:var(--text-3);margin-bottom:.4rem">💡 Nhấn vào từ không biết để lưu</div>
    <div class="read-text">${tappable}</div>
    <div class="word-popup" id="wPop"></div>
    <div style="height:.4rem"></div>
    <div style="font-size:13px;font-weight:500;color:var(--text-0);margin-bottom:.5rem">${q.q}</div>
    <div class="mcq">${q.opts.map((o,i)=>`<button class="mopt" onclick="checkR(${i},${q.c},'${q.explain.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')"> ${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
    <div class="answer-explain" id="rExp"></div>
  </div>`;
  document.getElementById('rBtns').innerHTML='';
}
function tapW(word){
  const pop=document.getElementById('wPop');pop.classList.add('on');
  pop.innerHTML=`<div style="font-size:13px;font-weight:700;color:var(--text-0)">"${word}"</div>
    <div style="font-size:11px;color:var(--text-3);margin:.2rem 0">Lưu từ?</div>
    <button class="btn btn-primary btn-sm" onclick="ss('saved_${word}',true);showFloat('✓ Đã lưu');document.getElementById('wPop').classList.remove('on')">+ Lưu</button>
    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('wPop').classList.remove('on')">✕</button>`;
}
function checkR(chosen,correct,explain){
  const s=session;if(s.answered)return;s.answered=true;
  document.querySelectorAll('.mopt').forEach((b,i)=>{b.disabled=true;if(i===chosen)b.classList.add(chosen===correct?'ok':'no');if(i===correct&&chosen!==correct)b.classList.add('show');});
  const exp=document.getElementById('rExp');exp.classList.add('show');
  exp.innerHTML=`<strong>Tại sao ${String.fromCharCode(65+correct)} đúng:</strong> ${explain}`;
  const ok=chosen===correct;
  if(ok){s.correct++;onOk('read',10);}else{s.wrong++;onNo('read');}
  const ts2=READ_TEXTS[s.lv]||[];const art=ts2[s.queue?.[s.idx]];const hasMore=art&&s.qIdx<art.questions.length-1;
  document.getElementById('rBtns').innerHTML=`<button class="btn ${ok?'btn-correct':'btn-wrong'}" onclick="${hasMore?'session.qIdx++;renderRCard()':'session.idx++;session.qIdx=0;renderRCard()'}">${hasMore?'Câu tiếp →':'Bài tiếp →'}</button>`;
}

const LV_DESCRIPTIONS={A0:'Chưa biết gì — bắt đầu từ Alphabet và những từ đầu tiên',A1:'Đã xong A1 — biết sein/haben, Artikel, câu đơn giản',A2:'Đã xong A2 — biết Perfekt, Modalverben, Dativ/Akkusativ',B1:'Đã xong B1 — biết Nebensätze, Passiv, Konjunktiv II',B2:'Đã xong B2 — biết Relativsatz, Konzessiv, văn học thuật',C1:'Đã xong C1 — biết Partizip, Nominalisierung, văn phong cao'};

      </div>

      :`<div class="setting-row"><span class="setting-lbl">Tổng ngày</span>
        <input type="number" class="input" style="width:80px" value="${cfg.totalDays||90}" min="7" max="730" onchange="cfg.totalDays=parseInt(this.value);calcPlan();daily=null;saveAll();renderSettings()">
        </div>
        <div class="setting-note">→ <strong>${cfg.hoursPerDay}h/ngày</strong> · ~<strong>${plan.totalHours}h</strong> tổng</div>`}
    </div>
    <div class="setting-block">
      <div class="setting-block-title">🎨 Giao diện</div>
      <div class="setting-row">
        <span class="setting-lbl">Chế độ màu</span>

      ${['vocab','grammar','listen','speak','write','read'].map(k=>{

        const names={vocab:'Từ vựng',grammar:'Ngữ pháp',listen:'Nghe',speak:'Nói',write:'Viết',read:'Đọc'};
        const a=acc[k]||0,n=accN[k]||0;const col=a>=80?'var(--green)':a>=60?'var(--accent)':a>=40?'var(--amber)':'var(--red)';
