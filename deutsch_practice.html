<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>Deutsch Prüfung — Luyện thi Goethe/Telc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#0a0a0f;--bg-1:#111118;--bg-2:#16161f;--bg-3:#1c1c28;--bg-4:#252535;
  --border-0:rgba(255,255,255,.06);--border-1:rgba(255,255,255,.1);--border-2:rgba(255,255,255,.18);
  --text-0:#ffffff;--text-1:rgba(255,255,255,.85);--text-2:rgba(255,255,255,.52);--text-3:rgba(255,255,255,.28);
  --accent:#4F8EF7;--accent-dim:rgba(79,142,247,.12);--accent-glow:rgba(79,142,247,.28);
  --green:#3ECF8E;--green-dim:rgba(62,207,142,.1);--green-md:rgba(62,207,142,.25);
  --red:#F87171;--red-dim:rgba(248,113,113,.1);--red-md:rgba(248,113,113,.25);
  --amber:#FBBF24;--amber-dim:rgba(251,191,36,.1);--amber-md:rgba(251,191,36,.25);
  --purple:#A78BFA;--purple-dim:rgba(167,139,250,.1);
  --font-sans:'Geist',system-ui,sans-serif;--font-mono:'Geist Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{font-family:var(--font-sans);background:var(--bg-0);color:var(--text-1);min-height:100vh;padding-bottom:80px;overflow-x:hidden;-webkit-font-smoothing:antialiased;font-size:15px;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}
.wrap{max-width:580px;margin:0 auto;padding:.9rem 1rem 0;position:relative;z-index:1;}

/* TOP */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.55rem 0;margin-bottom:.75rem;border-bottom:1px solid var(--border-0);}
.logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--text-0);letter-spacing:-.3px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 8px rgba(248,113,113,.4);animation:rdot 2s ease infinite;}
@keyframes rdot{0%,100%{opacity:1}50%{opacity:.4}}
.logo-sub{font-size:11px;color:var(--text-3);font-family:var(--font-mono);}
.nav-btns{display:flex;gap:5px;}
.nav-btn{background:var(--bg-2);border:1px solid var(--border-1);border-radius:8px;padding:5px 9px;font-size:12px;cursor:pointer;color:var(--text-2);font-family:var(--font-sans);transition:all .15s;}
.nav-btn:hover{background:var(--bg-3);color:var(--text-1);}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.92);backdrop-filter:blur(20px);border-top:1px solid var(--border-0);display:flex;z-index:100;}
.nb{flex:1;padding:9px 0 7px;border:none;background:transparent;cursor:pointer;font-family:var(--font-sans);display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text-3);font-size:9px;font-weight:500;transition:color .15s;}
.nb.on{color:var(--accent);}
.nb-i{font-size:18px;line-height:1;}

/* PANELS */
.panel{display:none;}.panel.show{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.card{background:var(--bg-1);border:1px solid var(--border-0);border-radius:14px;padding:1rem 1.1rem;margin-bottom:.75rem;transition:border-color .2s;}
.card-accent{background:linear-gradient(135deg,var(--accent-dim),transparent);border:1px solid var(--accent-glow);border-radius:14px;padding:1rem 1.1rem;margin-bottom:.75rem;}
.card-sm{background:var(--bg-2);border:1px solid var(--border-0);border-radius:10px;padding:.65rem .85rem;margin-bottom:.5rem;}

/* BADGE */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;font-family:var(--font-mono);}
.b-A1{color:#4ADE80;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);}
.b-A2{color:#34D399;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);}
.b-B1{color:#FBBF24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);}
.b-B2{color:#F97316;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.2);}
.b-C1{color:#A78BFA;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);}
.b-C2{color:#F472B6;background:rgba(244,114,182,.1);border:1px solid rgba(244,114,182,.2);}

/* TIMER */
.timer-bar{background:var(--bg-2);border:1px solid var(--border-1);border-radius:12px;padding:.55rem .85rem;display:flex;align-items:center;gap:10px;margin-bottom:.75rem;}
.timer-display{font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--text-0);letter-spacing:1px;min-width:60px;}
.timer-display.warn{color:var(--amber);animation:twarn .5s ease infinite;}
.timer-display.crit{color:var(--red);animation:tcrit .3s ease infinite;}
@keyframes twarn{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes tcrit{0%,100%{opacity:1}50%{opacity:.2}}
.timer-label{font-size:11px;color:var(--text-3);font-family:var(--font-mono);flex:1;}
.timer-track{flex:1;height:4px;background:var(--bg-4);border-radius:2px;overflow:hidden;}
.timer-fill{height:4px;border-radius:2px;transition:width 1s linear,background .5s;}
.timer-btns{display:flex;gap:5px;}
.tbtn{background:var(--bg-3);border:1px solid var(--border-1);border-radius:7px;padding:4px 9px;font-size:11px;cursor:pointer;color:var(--text-2);font-family:var(--font-sans);transition:all .15s;}
.tbtn:hover{color:var(--text-1);border-color:var(--border-2);}
.tbtn.start{background:var(--accent);color:#fff;border-color:transparent;}

/* PROGRESS STEPS */
.steps{display:flex;gap:3px;margin-bottom:.75rem;align-items:center;}
.step{flex:1;height:3px;border-radius:2px;background:var(--bg-4);transition:background .3s;}
.step.done{background:var(--green);}
.step.active{background:var(--accent);}
.step-label{font-size:10px;color:var(--text-3);font-family:var(--font-mono);white-space:nowrap;margin-left:6px;}

/* SECTION HEADER */
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:.65rem;}
.sec-icon{font-size:20px;}
.sec-title{font-size:14px;font-weight:700;color:var(--text-0);letter-spacing:-.3px;}
.sec-sub{font-size:11px;color:var(--text-3);font-family:var(--font-mono);}
.label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--font-mono);}

/* INSTRUCTION BOX */
.instr-box{background:var(--accent-dim);border:1px solid var(--accent-glow);border-radius:10px;padding:.65rem .9rem;font-size:12.5px;color:var(--text-2);line-height:1.7;margin-bottom:.65rem;}
.instr-box strong{color:var(--accent);display:block;font-size:10px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.25rem;font-family:var(--font-mono);}

/* MCQ */
.mcq{display:flex;flex-direction:column;gap:7px;margin:.5rem 0;}
.mopt{padding:10px 14px;border-radius:10px;border:1px solid var(--border-1);background:var(--bg-2);font-size:13.5px;cursor:pointer;text-align:left;font-family:var(--font-sans);color:var(--text-1);transition:all .15s;line-height:1.4;}
.mopt:hover:not(:disabled){border-color:var(--border-2);background:var(--bg-3);}
.mopt.ok{background:var(--green-dim);border-color:var(--green-md);color:var(--green);pointer-events:none;}
.mopt.no{background:var(--red-dim);border-color:var(--red-md);color:var(--red);pointer-events:none;}
.mopt.show{background:var(--green-dim);border-color:var(--green-md);color:var(--green);pointer-events:none;}

/* EXPLAIN BOX */
.explain-box{background:var(--bg-2);border:1px solid var(--border-0);border-left:2px solid var(--accent);border-radius:10px;padding:.6rem .85rem;font-size:12px;color:var(--text-2);line-height:1.65;display:none;margin-top:.4rem;}
.explain-box.show{display:block;animation:fadeIn .2s ease;}

/* LÜCKENTEXT */
.luecken-text{font-size:14px;color:var(--text-1);line-height:2.6;background:var(--bg-2);border:1px solid var(--border-0);border-radius:12px;padding:.9rem 1rem;margin:.5rem 0;}
.luecke{display:inline-block;position:relative;}
.luecke-input{border:none;border-bottom:2px solid var(--accent);background:transparent;color:var(--accent);font-size:14px;font-family:var(--font-sans);text-align:center;width:90px;outline:none;padding:0 3px;}
.luecke-input.ok{border-bottom-color:var(--green);color:var(--green);}
.luecke-input.no{border-bottom-color:var(--red);color:var(--red);}
.luecke-num{font-size:9px;color:var(--text-3);position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);}

/* ZUORDNUNG */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:.5rem 0;}
.match-item{background:var(--bg-2);border:1px solid var(--border-1);border-radius:10px;padding:.6rem .75rem;font-size:13px;color:var(--text-1);cursor:pointer;transition:all .15s;line-height:1.4;}
.match-item:hover{border-color:var(--border-2);}
.match-item.selected{border-color:var(--accent-glow);background:var(--accent-dim);color:var(--accent);}
.match-item.matched{border-color:var(--green-md);background:var(--green-dim);color:var(--green);pointer-events:none;}
.match-item.wrong{border-color:var(--red-md);background:var(--red-dim);color:var(--red);pointer-events:none;}
.match-num{font-size:10px;font-family:var(--font-mono);color:var(--text-3);display:block;margin-bottom:2px;}

/* READING TEXT */
.read-passage{background:var(--bg-2);border:1px solid var(--border-0);border-radius:12px;padding:.85rem 1rem;font-size:14px;color:var(--text-1);line-height:1.85;margin-bottom:.65rem;max-height:240px;overflow-y:auto;}
.read-passage::-webkit-scrollbar{width:3px;}
.read-passage::-webkit-scrollbar-thumb{background:var(--border-1);border-radius:2px;}

/* WRITING */
.write-prompt{background:linear-gradient(135deg,var(--purple-dim),transparent);border:1px solid rgba(167,139,250,.2);border-radius:12px;padding:.85rem 1rem;margin-bottom:.65rem;}
.wp-tag{font-size:10px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.35rem;font-family:var(--font-mono);}
.wp-text{font-size:14px;font-weight:600;color:var(--text-0);line-height:1.5;}
.wp-vi{font-size:12px;color:var(--text-3);margin-top:.3rem;font-style:italic;}
.write-area{width:100%;min-height:120px;padding:.75rem;border-radius:10px;border:1px solid var(--border-1);background:var(--bg-2);color:var(--text-0);font-size:14px;font-family:var(--font-sans);outline:none;resize:vertical;line-height:1.6;transition:border-color .2s;}
.write-area:focus{border-color:var(--accent);}
.word-count{font-size:11px;color:var(--text-3);text-align:right;margin-top:3px;font-family:var(--font-mono);}
.word-count.ok{color:var(--green);}
.word-count.low{color:var(--amber);}
.rubric-item{display:flex;align-items:center;gap:9px;padding:.45rem .6rem;border-radius:8px;margin-bottom:3px;background:var(--bg-2);border:1px solid var(--border-0);cursor:pointer;transition:all .15s;}
.rubric-item:hover{border-color:var(--border-1);}
.rubric-item.done{background:var(--green-dim);border-color:var(--green-md);}
.rc-box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;}
.rubric-item.done .rc-box{background:var(--green);border-color:var(--green);color:#000;}
.rc-text{font-size:12.5px;color:var(--text-2);}
.rubric-item.done .rc-text{color:var(--green);}

/* SPEAKING */
.speak-card{background:var(--bg-1);border:1px solid var(--border-1);border-radius:14px;padding:1.1rem;text-align:center;margin-bottom:.65rem;}
.speak-role{font-size:10px;color:var(--text-3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;}
.speak-q{font-size:18px;font-weight:600;color:var(--text-0);line-height:1.5;margin:.35rem 0;letter-spacing:-.3px;}
.speak-hint{font-size:12px;color:var(--amber);background:var(--amber-dim);border:1px solid var(--amber-md);border-radius:8px;padding:.4rem .7rem;margin:.6rem 0;text-align:left;line-height:1.6;}
.mic-wrap{display:flex;flex-direction:column;align-items:center;gap:.4rem;margin:.75rem 0;}
.mic-btn{width:64px;height:64px;border-radius:50%;border:2px solid var(--border-2);background:var(--bg-2);color:var(--text-2);font-size:26px;cursor:pointer;transition:all .2s;}
.mic-btn:hover{border-color:var(--accent-glow);color:var(--accent);background:var(--accent-dim);}
.mic-btn.rec{background:var(--red-dim);border-color:var(--red-md);color:var(--red);animation:mPulse 1s infinite;}
@keyframes mPulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}50%{box-shadow:0 0 0 10px rgba(248,113,113,0)}}
.transcript-box{background:var(--bg-2);border:1px solid var(--border-0);border-radius:10px;padding:.6rem .85rem;font-size:13px;color:var(--text-2);min-height:44px;margin-top:.4rem;text-align:left;font-style:italic;}
.spk-btn{background:var(--bg-3);border:1px solid var(--border-1);border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;color:var(--text-2);font-family:var(--font-sans);display:inline-flex;align-items:center;gap:3px;transition:all .15s;margin:.3rem 0;}
.spk-btn svg{width:11px;height:11px;fill:currentColor;}
.spk-btn:hover{color:var(--accent);border-color:var(--accent-glow);}
.spk-btn.go{color:var(--accent);background:var(--accent-dim);animation:pulse .7s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* BUTTONS */
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:.85rem;}
.btn{padding:9px 18px;border-radius:10px;border:1px solid var(--border-1);background:var(--bg-2);color:var(--text-1);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-sans);transition:all .15s;letter-spacing:-.1px;}
.btn:hover{background:var(--bg-3);border-color:var(--border-2);color:var(--text-0);}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:#fff;border-color:transparent;box-shadow:0 0 0 1px var(--accent-glow),0 4px 16px rgba(79,142,247,.25);}
.btn-primary:hover{opacity:.88;background:var(--accent);}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:8px;}
.btn-ghost{background:transparent;border-color:var(--border-1);}
.btn-ok{background:var(--green-dim);color:var(--green);border-color:var(--green-md);}
.btn-bad{background:var(--red-dim);color:var(--red);border-color:var(--red-md);}

/* HOME CARDS */
.exam-card{background:var(--bg-1);border:1px solid var(--border-0);border-radius:14px;padding:1rem 1.05rem;margin-bottom:.65rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.exam-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0;background:transparent;transition:background .2s;}
.exam-card:hover{border-color:var(--border-1);background:var(--bg-2);}
.exam-card:hover::before{background:var(--accent);}
.ec-top{display:flex;align-items:center;gap:10px;margin-bottom:.4rem;}
.ec-icon{font-size:22px;}
.ec-title{font-size:14px;font-weight:600;color:var(--text-0);}
.ec-meta{font-size:11px;color:var(--text-3);font-family:var(--font-mono);display:flex;gap:8px;flex-wrap:wrap;margin-top:.2rem;}
.ec-desc{font-size:12.5px;color:var(--text-2);line-height:1.55;}
.ec-score{position:absolute;top:.9rem;right:.9rem;font-size:13px;font-weight:700;font-family:var(--font-mono);}

/* SCORE DISPLAY */
.score-section{background:var(--bg-2);border:1px solid var(--border-0);border-radius:12px;padding:.7rem .9rem;margin-bottom:.5rem;}
.ss-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem;}
.ss-name{font-size:12px;font-weight:600;color:var(--text-1);}
.ss-score{font-size:13px;font-weight:700;font-family:var(--font-mono);}
.ss-bar{height:5px;background:var(--bg-4);border-radius:3px;overflow:hidden;}
.ss-fill{height:5px;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);}

/* RESULT */
.result-wrap{text-align:center;padding:1.5rem 0;}
.result-ring{width:110px;height:110px;border-radius:50%;margin:0 auto .85rem;display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;border:3px solid var(--border-1);}
.result-pct{font-size:28px;font-weight:700;font-family:var(--font-mono);color:var(--text-0);}
.result-pts{font-size:11px;color:var(--text-3);font-family:var(--font-mono);}
.result-verdict{font-size:18px;font-weight:700;color:var(--text-0);letter-spacing:-.4px;margin-bottom:.3rem;}
.result-sub{font-size:13px;color:var(--text-2);}
.cert-badge{display:inline-flex;align-items:center;gap:8px;background:var(--amber-dim);border:1px solid var(--amber-md);border-radius:10px;padding:.6rem 1.1rem;margin:1rem 0;font-size:13px;font-weight:600;color:var(--amber);}

/* MISC */
.divider{height:1px;background:var(--border-0);margin:.75rem 0;}
.float-fb{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:700;pointer-events:none;z-index:999;opacity:0;white-space:nowrap;font-family:var(--font-mono);}
.float-fb.show{animation:fup .9s ease forwards;}
@keyframes fup{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}15%{opacity:1;transform:translate(-50%,-65%) scale(1.08)}70%{opacity:1;transform:translate(-50%,-85%)}100%{opacity:0;transform:translate(-50%,-120%) scale(.9)}}
.cp{position:fixed;pointer-events:none;z-index:998;animation:cfall linear forwards;border-radius:2px;}
@keyframes cfall{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
.note-area{width:100%;min-height:42px;padding:.5rem .7rem;border-radius:8px;border:1px solid var(--border-0);background:var(--bg-0);color:var(--text-1);font-size:12px;font-family:var(--font-sans);outline:none;resize:none;transition:border-color .2s;margin-top:.4rem;}
.note-area:focus{border-color:var(--accent);}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;font-family:var(--font-mono);padding:3px 9px;border-radius:20px;border:1px solid var(--border-1);color:var(--text-2);background:var(--bg-1);}
.tag.live{color:var(--red);background:var(--red-dim);border-color:var(--red-md);animation:pulse .8s infinite;}
</style>
</head>

<script>

function confetti(){
  ['#4F8EF7','#3ECF8E','#FBBF24','#F87171','#A78BFA'].forEach((c,i)=>{
    for(let j=0;j<6;j++){
      const el=document.createElement('div');el.className='cp';
      el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${c};width:${4+Math.random()*6}px;height:${4+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${.8+Math.random()*1.2}s;animation-delay:${i*.06+j*.1}s;`;
      document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
    }
  });
}

function speak(txt,btn=null){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  if(btn&&btn.classList.contains('go')){btn.classList.remove('go');return;}
  document.querySelectorAll('.spk-btn').forEach(b=>b.classList.remove('go'));
  const u=new SpeechSynthesisUtterance(txt);u.lang='de-DE';u.rate=0.87;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('de'));if(v)u.voice=v;
  if(btn){btn.classList.add('go');u.onend=u.onerror=()=>btn.classList.remove('go');}
  speechSynthesis.speak(u);
}

// TIMER
// ═══════════════════════════════════════
function startTimer(totalSec){
  stopTimer();timerSec=totalSec;timerRunning=true;
  updateTimerUI(totalSec,totalSec);
  timerInterval=setInterval(()=>{
    timerSec--;updateTimerUI(timerSec,totalSec);
    if(timerSec<=0){stopTimer();showFloat('⏰ Hết giờ!');}
  },1000);
}
function stopTimer(){clearInterval(timerInterval);timerRunning=false;}
function updateTimerUI(sec,total){
  const el=document.getElementById('timerDisplay');if(!el)return;
  const m=~~(sec/60),s=sec%60;
  el.textContent=`${m}:${s<10?'0':''}${s}`;
  const pct=sec/total*100;
  const fill=document.getElementById('timerFill');
  if(fill){fill.style.width=pct+'%';fill.style.background=pct>50?'var(--accent)':pct>20?'var(--amber)':'var(--red)';}
  el.className='timer-display'+(sec<60?' crit':sec<180?' warn':'');
}

function startExam(examId){
  const exam=EXAMS.find(e=>e.id===examId);if(!exam)return;
  stopTimer();
  examState={
    examId, exam,
    sectionIdx:0,
    partIdx:0,
    scores:{},   // sectionId → {correct, total, answered}
    writings:{}, // partId → text
    rubrics:{},  // partId → Set
    startTime:Date.now()
  };
  wChecked=new Set();
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
  document.getElementById('p-exam').classList.add('show');
  document.getElementById('nb-home').classList.remove('on');
  renderSection();
}

function renderSection(){
  const {exam,sectionIdx}=examState;
  const section=exam.sections[sectionIdx];
  if(!section){finishExam();return;}
  examState.partIdx=0;
  examState.scores[section.id]={correct:0,total:0,partScores:{}};
  renderPart();
}

function renderPart(){
  const {exam,sectionIdx,partIdx}=examState;
  const section=exam.sections[sectionIdx];
  const part=section.parts[partIdx];
  if(!part){nextSection();return;}

  const el=document.getElementById('p-exam');
  const totalSections=exam.sections.length;
  const sectionNames=exam.sections.map(s=>s.skill);

  // Steps indicator
  let stepsHtml=`<div class="steps">`;
  exam.sections.forEach((s,i)=>{
    stepsHtml+=`<div class="step${i<sectionIdx?' done':i===sectionIdx?' active':''}"></div>`;
  });
  stepsHtml+=`<span class="step-label">${section.skill} ${sectionIdx+1}/${totalSections}</span></div>`;

  // Timer
  const timerHtml=`<div class="timer-bar">
    <span style="font-size:16px">${section.icon}</span>
    <div>
      <div id="timerDisplay" class="timer-display">--:--</div>
      <div class="timer-label">${section.label} · ${section.mins} phút</div>
    </div>
    <div class="timer-track"><div id="timerFill" class="timer-fill" style="width:100%"></div></div>
    <div class="timer-btns">
      <button class="tbtn start" onclick="startTimer(${section.mins*60})">▶ Bắt đầu</button>
      <button class="tbtn" onclick="stopTimer()">⏸</button>
    </div>
  </div>`;

  let contentHtml='';

  // Instructions
  contentHtml+=`<div class="instr-box"><strong>📋 Hướng dẫn</strong>${part.instructions}</div>`;

  // Render by type
  if(part.type==='zuordnung') contentHtml+=renderZuordnung(part);
  else if(part.type==='mcq_multi') contentHtml+=renderMcqMulti(part);
  else if(part.type==='lueckentext') contentHtml+=renderLueckentext(part);
  else if(part.type==='hoeren_mcq') contentHtml+=renderHoerenMcq(part);
  else if(part.type==='hoeren_rtf') contentHtml+=renderHoerenRtf(part);
  else if(part.type==='schreiben') contentHtml+=renderSchreiben(part);
  else if(part.type==='sprechen_dialog') contentHtml+=renderSprechenDialog(part);
  else if(part.type==='sprechen_planung') contentHtml+=renderSprechenPlanung(part);
  else if(part.type==='sprechen_bild') contentHtml+=renderSprechenBild(part);

  // Nav buttons
  const isLastPart=partIdx>=section.parts.length-1;
  const isLastSection=sectionIdx>=exam.sections.length-1;
  contentHtml+=`<div class="btn-row" style="margin-top:1.2rem">
    <button class="btn btn-ghost btn-sm" onclick="goPanel('home')">✕ Dừng lại</button>
    <button class="btn btn-primary" onclick="${isLastPart?'nextSection':'nextPart'}()">${isLastPart&&isLastSection?'Nộp bài →':isLastPart?'Kỹ năng tiếp →':'Phần tiếp →'}</button>
  </div>`;

  el.innerHTML=stepsHtml+timerHtml+`<div class="card">
    <div class="sec-hd">
      <span class="sec-icon">${section.icon}</span>
      <div><div class="sec-title">${part.label}</div><div class="sec-sub">${section.skill} · Teil ${partIdx+1}/${section.parts.length}</div></div>
    </div>
    ${contentHtml}
  </div>`;
  el.scrollTop=0;
  document.getElementById('p-exam').parentElement.scrollTop=0;
  document.querySelector('.content')||document.querySelector('.wrap')?.scrollTo(0,0);
  window.scrollTo(0,0);
}

function renderZuordnung(part){
  let html=`<div class="label" style="margin-bottom:.5rem">Anzeigen</div>`;

  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.75rem">`;

  });
  html+=`</div><div class="label" style="margin-bottom:.5rem">Personen → welche Anzeige?</div>`;
  part.persons.forEach((p,i)=>{
    const key=`zu_${part.id}_${i}`;
    html+=`<div class="card-sm" style="margin-bottom:.5rem">
      <div style="font-size:12px;color:var(--text-2);margin-bottom:.35rem">${p.text}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${[...part.items.map(it=>it.id),'X'].map(opt=>`<button class="tbtn" id="${key}_${opt}" onclick="selectZuordnung('${key}','${opt}','${p.ans}','${p.explain.replace(/'/g,"\\'")}')">${opt}</button>`).join('')}

      <div class="explain-box" id="exp_${key}"></div>
    </div>`;
  });
  return html;
}

function selectZuordnung(key,chosen,correct,explain){
  const buttons=document.querySelectorAll(`[id^="${key}_"]`);
  buttons.forEach(b=>b.disabled=true);
  const ok=chosen===correct;
  document.getElementById(`${key}_${chosen}`).style.cssText=ok?'background:var(--green-dim);color:var(--green);border-color:var(--green-md)':'background:var(--red-dim);color:var(--red);border-color:var(--red-md)';
  if(!ok)document.getElementById(`${key}_${correct}`).style.cssText='background:var(--green-dim);color:var(--green);border-color:var(--green-md)';
  const exp=document.getElementById('exp_'+key);exp.classList.add('show');exp.innerHTML='💡 '+explain;
  const sec=examState.exam.sections[examState.sectionIdx];
  const sc=examState.scores[sec.id];sc.total++;if(ok)sc.correct++;
}

function checkMcq(btn,chosen,correct,explain,key){

    <div class="label" style="margin-bottom:.3rem">Musterlösung</div>
    <div class="card-sm" style="font-size:13px;line-height:1.75;white-space:pre-line;font-style:italic">${part.sampleAnswer}</div>
    <div class="instr-box" style="margin-top:.4rem"><strong>💡 Hinweis</strong>${part.sampleTip}</div>
  </div>`;
  return html;
}
function updateWordCount(pid,min){
  const ta=document.getElementById('wTxt_'+pid);if(!ta)return;
  examState.writings[pid]=ta.value;
  const wc=ta.value.trim().split(/\s+/).filter(w=>w.length>0).length;
  const el=document.getElementById('wc_'+pid);if(!el)return;
  el.textContent=`${wc} Wörter · Minimum: ${min}`;
  el.className='word-count'+(wc>=min?' ok':' low');
}
function toggleRubric(pid,ri){
  if(wChecked.has(ri))wChecked.delete(ri);else wChecked.add(ri);
  examState.rubrics[pid]=new Set(wChecked);
  const item=document.getElementById(`rb_${pid}_${ri}`);
  const box=document.getElementById(`rcb_${pid}_${ri}`);
  if(item)item.classList.toggle('done',wChecked.has(ri));
  if(box)box.textContent=wChecked.has(ri)?'✓':'';
}
function toggleSample(pid){
  const el=document.getElementById('sample_'+pid);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}

function renderSprechenDialog(part){
  let html=`<div class="tag live" style="margin-bottom:.65rem">🔴 Live · Roleplay mit Prüfer</div>`;
  part.items.forEach((item,i)=>{
    const qe=item.q.replace(/'/g,"\\'");
    html+=`<div class="speak-card">
      <div class="speak-role">👤 ${item.role}</div>
      <div class="speak-q">"${item.q}"</div>
      <div class="speak-hint">💡 ${item.hint}</div>
      <button class="spk-btn" onclick="speak('${qe}',this)">${SPK} Nghe câu hỏi</button>
      <div class="mic-wrap">
        <button class="mic-btn" id="mic_${part.id}_${i}" onclick="toggleMic('${part.id}_${i}')">🎤</button>
        <div style="font-size:11px;color:var(--text-3);font-family:var(--font-mono)">Nhấn mic → trả lời</div>
      </div>
      <div class="transcript-box" id="tr_${part.id}_${i}">—</div>
    </div>`;
  });
  return html;
}

function renderSprechenPlanung(part){
  let html=`<div class="instr-box"><strong>🗓️ Situation</strong>${part.scenario}</div>
  <div class="tag live" style="margin-bottom:.65rem">🔴 Live · Gemeinsam planen</div>`;
  part.items.forEach((item,i)=>{
    const qe=item.q.replace(/'/g,"\\'");
    html+=`<div class="speak-card">
      <div class="speak-role">👤 ${item.role}</div>
      <div class="speak-q">"${item.q}"</div>
      <div class="speak-hint">💡 ${item.hint}</div>
      <button class="spk-btn" onclick="speak('${qe}',this)">${SPK} Nghe</button>
      <div class="mic-wrap">
        <button class="mic-btn" id="mic_${part.id}_${i}" onclick="toggleMic('${part.id}_${i}')">🎤</button>
        <div style="font-size:11px;color:var(--text-3);font-family:var(--font-mono)">Nhấn mic → trả lời</div>
      </div>
      <div class="transcript-box" id="tr_${part.id}_${i}">—</div>
    </div>`;
  });
  return html;
}

function renderSprechenBild(part){
  let timer=part.timeSeconds;
  return`<div class="speak-card">
    <div class="speak-role">📸 Bildbeschreibung</div>
    <div class="speak-q" style="font-size:16px;text-align:left;font-style:italic">${part.scenario}</div>
    <div style="margin:.6rem 0">
      <div class="label" style="margin-bottom:.3rem">Nützliche Ausdrücke</div>
      ${part.hints.map(h=>`<div class="card-sm" style="font-size:12px;color:var(--text-2);margin-bottom:3px">${h}</div>`).join('')}
    </div>
    <div id="bildTimer" style="font-size:20px;font-weight:700;font-family:var(--font-mono);color:var(--accent);text-align:center;margin:.5rem 0">${timer}s</div>
    <div class="mic-wrap">
      <button class="mic-btn" id="mic_bild" onclick="toggleMic('bild');startBildTimer(${timer})">🎤</button>
      <div style="font-size:11px;color:var(--text-3);font-family:var(--font-mono)">Nhấn mic để bắt đầu (${timer}s)</div>
    </div>
    <div class="transcript-box" id="tr_bild">—</div>
  </div>`;
}
function startBildTimer(sec){
  let t=sec;
  const interval=setInterval(()=>{
    t--;const el=document.getElementById('bildTimer');if(el)el.textContent=t+'s';
    else clearInterval(interval);
    if(t<=0){clearInterval(interval);showFloat('⏰ Zeit!');}
  },1000);
}

// ═══ MIC ═══
function toggleMic(key){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){showFloat('Cần Chrome để dùng mic!');return;}
  const btn=document.getElementById('mic_'+key);
  if(!btn)return;
  if(recActive){if(speechRec)speechRec.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  speechRec=new SR();speechRec.lang='de-DE';speechRec.continuous=false;speechRec.interimResults=true;
  recActive=true;btn.classList.add('rec');
  speechRec.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    const tr=document.getElementById('tr_'+key);if(tr)tr.textContent=t||'—';
  };
  speechRec.onerror=speechRec.onend=()=>{recActive=false;btn.classList.remove('rec');};
  speechRec.start();
}

// ═══ NAVIGATION ═══
function nextPart(){
  // Save writing before navigating
  const section=examState.exam.sections[examState.sectionIdx];
  const part=section.parts[examState.partIdx];
  if(part&&part.type==='schreiben'){
    const ta=document.getElementById('wTxt_'+part.id);
    if(ta)examState.writings[part.id]=ta.value;
    // Score writing by rubric
    const sc=examState.scores[section.id];
    const rubSet=examState.rubrics[part.id]||new Set();
    sc.correct=(sc.correct||0)+rubSet.size;
    sc.total=(sc.total||0)+part.rubric.length;
  }
  examState.partIdx++;
  renderPart();
}
function nextSection(){
  // Save last writing
  const section=examState.exam.sections[examState.sectionIdx];
  const part=section.parts[examState.partIdx];
  if(part&&part.type==='schreiben'){
    const ta=document.getElementById('wTxt_'+part.id);
    if(ta)examState.writings[part.id]=ta.value;
    const sc=examState.scores[section.id];
    const rubSet=examState.rubrics[part.id]||new Set();
    sc.correct=(sc.correct||0)+rubSet.size;
    sc.total=(sc.total||0)+part.rubric.length;
  }
  stopTimer();
  examState.sectionIdx++;
  renderSection();
}

// ═══════════════════════════════════════
// RESULT
// ═══════════════════════════════════════
function finishExam(){
  stopTimer();
  const {exam,scores}=examState;
  // Calc per-section scores
  let totalCorrect=0,totalQuestions=0;
  const sectionResults=exam.sections.map(sec=>{
    const sc=scores[sec.id]||{correct:0,total:0};
    if(sc.total>0){totalCorrect+=sc.correct;totalQuestions+=sc.total;}
    const pct=sc.total>0?Math.round(sc.correct/sc.total*100):null;
    return{...sec,correct:sc.correct,total:sc.total,pct};
  });
  const overallPct=totalQuestions>0?Math.round(totalCorrect/totalQuestions*100):0;
  const passed=overallPct>=exam.passScore;

  // Save to history
  history.unshift({examId:exam.id,level:exam.level,title:exam.title,pct:overallPct,passed,date:new Date().toLocaleDateString('vi'),sectionResults});
  history=history.slice(0,10);
  ss('practiceHistory',history);
  if(passed)confetti();

  const col=overallPct>=80?'var(--green)':overallPct>=60?'var(--accent)':'var(--amber)';
  const el=document.getElementById('p-result');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
  el.classList.add('show');
  el.innerHTML=`<div class="result-wrap">
    <div class="result-ring" style="border-color:${col};box-shadow:0 0 40px ${col}33">
      <div class="result-pct" style="color:${col}">${overallPct}%</div>
      <div class="result-pts">${totalCorrect}/${totalQuestions} đúng</div>
    </div>
    <div class="result-verdict">${passed?'🎉 Đạt!':'💪 Chưa đạt'}</div>
    <div class="result-sub">${exam.title} · Pass: ${exam.passScore}%</div>
    ${passed?`<div class="cert-badge">🏆 ${exam.level} Niveau erreicht!</div>`:''}
    <div style="margin:1rem 0">
      ${sectionResults.map(sr=>{
        const p=sr.pct??0;const c=p>=80?'var(--green)':p>=60?'var(--accent)':'var(--amber)';
        return`<div class="score-section">
          <div class="ss-top"><span class="ss-name">${sr.icon} ${sr.skill}</span><span class="ss-score" style="color:${c}">${sr.pct!==null?sr.pct+'%':'—'}</span></div>
          ${sr.pct!==null?`<div class="ss-bar"><div class="ss-fill" style="width:${sr.pct}%;background:${c}"></div></div>`:'<div style="font-size:11px;color:var(--text-3)">Sprechen — selbst bewertet</div>'}
        </div>`;
      }).join('')}
    </div>
    <div class="card-sm" style="text-align:left;margin-bottom:.75rem">
      <div class="label" style="margin-bottom:.4rem">💡 Nhận xét & Khuyến nghị</div>
      ${sectionResults.map(sr=>{
        if(sr.pct===null)return`<div style="font-size:12px;color:var(--text-2);margin-bottom:.3rem">🗣️ <strong>${sr.skill}:</strong> Tiếp tục luyện phản xạ với roleplays.</div>`;
        if(sr.pct>=80)return`<div style="font-size:12px;color:var(--green);margin-bottom:.3rem">✓ <strong>${sr.skill}:</strong> Xuất sắc! Giữ vững.</div>`;
        if(sr.pct>=60)return`<div style="font-size:12px;color:var(--amber);margin-bottom:.3rem">⚠ <strong>${sr.skill}:</strong> Khá ổn nhưng cần luyện thêm.</div>`;
        return`<div style="font-size:12px;color:var(--red);margin-bottom:.3rem">✗ <strong>${sr.skill}:</strong> Cần ôn tập thêm nhiều — ưu tiên kỹ năng này!</div>`;
      }).join('')}
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="startExam('${exam.id}')">↻ Làm lại</button>
      <button class="btn btn-ghost" onclick="goPanel('home');document.getElementById('nb-home').classList.add('on')">← Chọn đề khác</button>
    </div>
  </div>`;
  document.querySelector('.wrap').scrollTop=0;
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════
function renderHistory(){
  const el=document.getElementById('p-home');
  if(!history.length){
    el.innerHTML=`<div style="text-align:center;padding:3rem 1rem;color:var(--text-3)"><div style="font-size:36px;margin-bottom:.75rem">📊</div><div style="font-size:14px">Chưa có lịch sử<br>Làm thử đề thi để xem kết quả</div><div class="btn-row" style="margin-top:1rem"><button class="btn btn-primary" onclick="goPanel('home')">Chọn đề thi →</button></div></div>`;
    return;
  }
  el.innerHTML=`<div style="font-size:16px;font-weight:700;color:var(--text-0);margin-bottom:.85rem">📊 Lịch sử thi</div>
  ${history.map(h=>{
    const col=h.pct>=80?'var(--green)':h.pct>=60?'var(--accent)':'var(--amber)';
    return`<div class="exam-card">
      <div class="ec-top">
        <span class="ec-icon">${h.passed?'🏆':'📝'}</span>
        <div><div class="ec-title">${h.title}</div><div class="ec-meta"><span class="badge b-${h.level}">${h.level}</span><span>${h.date}</span><span style="color:${h.passed?'var(--green)':'var(--red)'}">${h.passed?'✓ Đạt':'✗ Chưa đạt'}</span></div></div>
      </div>
      <div class="ec-score" style="color:${col}">${h.pct}%</div>
    </div>`;
  }).join('')}
  <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:.5rem;color:var(--red)" onclick="if(confirm('Xóa lịch sử?')){history=[];ss('practiceHistory',[]);renderHistory()}">Xóa lịch sử</button>`;
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
speechSynthesis&&speechSynthesis.getVoices();
renderHome();
document.getElementById('nb-home').classList.add('on');
</script>
