<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#2563EB">
<meta name="mobile-web-app-capable" content="yes">
<title>Deutsch Handbuch A1–C2</title>
<style>
:root{--bg:#b8b8b8;--surface:#fff;--surface2:#f4f4f4;--border:#d8d8d8;--text:#0f0f0f;--text2:#555;--text3:#999;--accent:#2563EB;--accent-lt:#EFF6FF;--accent-md:#BFDBFE;--accent-dk:#1E40AF;--green:#16A34A;--green-bg:#F0FDF4;--green-md:#BBF7D0;--red:#DC2626;--red-bg:#FEF2F2;--red-md:#FECACA;--amber:#D97706;--amber-bg:#FFFBEB;--amber-md:#FDE68A;--purple:#7C3AED;--purple-bg:#F5F3FF;--purple-md:#DDD6FE;--sh:0 1px 10px rgba(0,0,0,.1);}
[data-dark]{--bg:#0a0a0a;--surface:#161616;--surface2:#202020;--border:#303030;--text:#f0f0f0;--text2:#888;--text3:#505050;--accent:#3B82F6;--accent-lt:#1E3A5F;--accent-md:#1E3A8A;--accent-dk:#93C5FD;--green:#22C55E;--green-bg:#052e16;--green-md:#166534;--red:#F87171;--red-bg:#2d0000;--red-md:#7f1d1d;--amber:#FCD34D;--amber-bg:#292200;--amber-md:#78350f;--purple:#A78BFA;--purple-bg:#1e1040;--purple-md:#4c1d95;--sh:0 1px 10px rgba(0,0,0,.35);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{padding-bottom:72px!important;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:64px;overflow-x:hidden;transition:background .2s,color .2s;font-size:15px;}
.wrap{max-width:580px;margin:0 auto;padding:.85rem .9rem 0;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;}
.logo{font-weight:700;font-size:15px;color:var(--accent);}
.top-right{display:flex;gap:5px;}
.icon-btn{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:5px 8px;font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit;box-shadow:var(--sh);}
.link-app{background:var(--accent-lt);border:0.5px solid var(--accent-md);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--accent);font-family:inherit;cursor:pointer;font-weight:500;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:0.5px solid var(--border);display:flex;z-index:100;}
.nb{flex:1;padding:7px 0 5px;border:none;background:transparent;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px;color:var(--text3);font-size:9px;}
.nb.on{color:var(--accent);}
.nb-i{font-size:18px;line-height:1;}
.panel{display:none;}.panel.show{display:block;}
.search-wrap{position:relative;margin-bottom:.8rem;}
.search-input{width:100%;padding:9px 12px 9px 36px;border-radius:10px;border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;outline:none;}
.search-input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:13px;cursor:pointer;color:var(--text3);background:none;border:none;}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.7rem;}
.fpill{padding:4px 11px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface2);font-size:12px;cursor:pointer;font-family:inherit;color:var(--text2);}
.fpill.on{font-weight:600;}
.card{background:var(--surface);border-radius:14px;border:0.5px solid var(--border);padding:1rem 1.05rem;box-shadow:var(--sh);margin-bottom:.7rem;}
.card-flat{background:var(--surface2);border-radius:10px;border:0.5px solid var(--border);padding:.65rem .8rem;margin-bottom:.55rem;}
.acc-item{background:var(--surface);border-radius:12px;border:0.5px solid var(--border);margin-bottom:.55rem;overflow:hidden;box-shadow:var(--sh);}
.acc-hd{display:flex;align-items:center;gap:8px;padding:.75rem 1rem;cursor:pointer;transition:background .15s;user-select:none;}
.acc-hd:hover,.acc-hd.open{background:var(--surface2);}
.acc-lv{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:700;flex-shrink:0;}
.acc-title{font-size:13px;font-weight:600;flex:1;line-height:1.3;}
.acc-sub{font-size:11px;color:var(--text3);}
.acc-check{width:20px;height:20px;border-radius:5px;border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;cursor:pointer;}
.acc-check.done{background:var(--green);border-color:var(--green);color:#fff;}
.acc-arrow{font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.acc-hd.open .acc-arrow{transform:rotate(180deg);}
.acc-body{display:none;padding:.8rem 1rem;border-top:0.5px solid var(--border);}
.acc-hd.open+.acc-body{display:block;}
.formula{background:var(--surface2);border-radius:8px;padding:.5rem .75rem;font-family:monospace;font-size:12.5px;color:var(--accent);border:0.5px solid var(--border);margin:.4rem 0;text-align:center;word-break:break-word;}
.ex-box{background:var(--surface2);border-radius:8px;padding:.45rem .7rem;font-size:13px;font-style:italic;margin:.3rem 0;border-left:3px solid var(--border);}
.ex-vi{font-size:11px;color:var(--text3);font-style:normal;margin-top:2px;}
.tip-box{background:var(--amber-bg);border-radius:8px;padding:.45rem .7rem;font-size:12px;color:var(--amber);margin:.3rem 0;border-left:3px solid var(--amber-md);}
.danger-box{background:var(--red-bg);border-radius:8px;padding:.45rem .7rem;font-size:12px;color:var(--red);margin:.3rem 0;border-left:3px solid var(--red-md);}
.note-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin:.5rem 0 .25rem;}
.spk{background:none;border:0.5px solid var(--border);cursor:pointer;padding:3px 8px;border-radius:20px;font-size:11px;display:inline-flex;align-items:center;gap:3px;color:var(--text2);font-family:inherit;margin-top:.4rem;}
.spk svg{width:11px;height:11px;fill:currentColor;}
.spk.go{animation:pulse .7s infinite;background:var(--accent-lt);color:var(--accent);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:7px;font-weight:600;}
.lc-A1{background:#dcfce7;color:#15803d;}.lc-A2{background:#d1fae5;color:#065f46;}.lc-B1{background:#fef9c3;color:#854d0e;}.lc-B2{background:#ffedd5;color:#9a3412;}.lc-C1{background:#ede9fe;color:#5b21b6;}.lc-C2{background:#fce7f3;color:#9d174d;}
[data-dark] .lc-A1{background:#052e16;color:#4ade80;}[data-dark] .lc-A2{background:#022c22;color:#34d399;}[data-dark] .lc-B1{background:#292200;color:#fbbf24;}[data-dark] .lc-B2{background:#431407;color:#fb923c;}[data-dark] .lc-C1{background:#2e1065;color:#a78bfa;}[data-dark] .lc-C2{background:#500724;color:#f9a8d4;}
.prog-overview{background:var(--surface);border-radius:14px;padding:.9rem 1rem;box-shadow:var(--sh);margin-bottom:.7rem;border:0.5px solid var(--border);}
.prog-title{font-size:13px;font-weight:700;margin-bottom:.65rem;}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:.45rem;}
.prog-lv{font-size:11px;font-weight:700;width:24px;}
.prog-bar-wrap{flex:1;height:6px;background:var(--surface2);border-radius:3px;}
.prog-bar-fill{height:6px;border-radius:3px;transition:width .5s;}
.prog-count{font-size:11px;color:var(--text3);width:36px;text-align:right;}
.verb-table{width:100%;border-collapse:collapse;font-size:13px;margin:.4rem 0;}
.verb-table th{background:var(--surface2);padding:5px 8px;text-align:left;font-weight:600;font-size:11px;color:var(--text2);border-bottom:0.5px solid var(--border);}
.verb-table td{padding:5px 8px;border-bottom:0.5px solid var(--surface2);}
.verb-table .irreg{color:var(--red);font-weight:600;}
.template-card{background:var(--surface);border-radius:14px;border:0.5px solid var(--border);margin-bottom:.7rem;overflow:hidden;box-shadow:var(--sh);}
.template-hd{background:var(--accent-lt);padding:.75rem 1rem;border-bottom:0.5px solid var(--accent-md);}
.template-hd-title{font-size:14px;font-weight:700;color:var(--accent-dk);}
.template-hd-sub{font-size:11px;color:var(--accent-dk);opacity:.75;margin-top:2px;}
.template-body{padding:.8rem 1rem;}
.ts-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.2rem;}
.ts-content{font-size:13px;color:var(--text2);line-height:1.7;font-style:italic;margin-bottom:.5rem;}
.ts-content strong{color:var(--text);font-style:normal;}
.rubric-row{display:flex;align-items:center;justify-content:space-between;padding:.3rem .5rem;background:var(--surface2);border-radius:7px;margin-bottom:3px;}
.rubric-item{font-size:12px;color:var(--text2);}
.rubric-pts{font-size:12px;font-weight:700;color:var(--accent);}
.connector-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:.4rem 0;}
.conn-card{background:var(--surface2);border-radius:8px;padding:.45rem .6rem;border:0.5px solid var(--border);}
.conn-de{font-size:12.5px;font-weight:600;color:var(--accent);}
.conn-vi{font-size:11px;color:var(--text3);margin-top:1px;}
.conn-ex{font-size:11px;color:var(--text2);font-style:italic;margin-top:2px;}
.word-list{display:flex;flex-wrap:wrap;gap:6px;margin:.5rem 0;}
.word-chip{padding:4px 9px;border-radius:8px;font-size:12px;background:var(--surface2);border:0.5px solid var(--border);cursor:pointer;}
.wde{font-weight:600;color:var(--text);}
.wvi{font-size:10px;color:var(--text3);display:block;}
.tip-card{background:var(--surface);border-radius:12px;border:0.5px solid var(--border);padding:.85rem 1rem;margin-bottom:.6rem;box-shadow:var(--sh);}
.tc-skill{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem;}
.tc-title{font-size:14px;font-weight:700;margin-bottom:.4rem;}
.tc-body{font-size:13px;color:var(--text2);line-height:1.75;}
.tc-body li{margin-left:1.1rem;margin-bottom:.25rem;}
.error-card{background:var(--red-bg);border-radius:12px;border:0.5px solid var(--red-md);padding:.75rem 1rem;margin-bottom:.6rem;}
.ec-wrong{font-size:13px;color:var(--red);font-weight:600;margin-bottom:.3rem;}
.ec-correct{font-size:13px;color:var(--green);font-weight:600;margin-bottom:.25rem;}
.ec-explain{font-size:12px;color:var(--text2);}
.float-fb{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);font-size:19px;font-weight:700;pointer-events:none;z-index:999;opacity:0;white-space:nowrap;}
.float-fb.show{animation:fup .9s ease forwards;}
@keyframes fup{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}15%{opacity:1;transform:translate(-50%,-65%) scale(1.1)}70%{opacity:1;transform:translate(-50%,-85%)}100%{opacity:0;transform:translate(-50%,-120%) scale(.9)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo">📖 Handbuch A1–C2</div>
    <div class="top-right">
      <button class="link-app" onclick="window.location.href='index.html'">→ App học</button>
      <button class="icon-btn" id="darkBtn" onclick="toggleDark()">🌙</button>
    </div>
  </div>
  <div class="panel show" id="p-grammar"></div>
  <div class="panel" id="p-writing"></div>
  <div class="panel" id="p-verbs"></div>
  <div class="panel" id="p-vocab"></div>
  <div class="panel" id="p-tips"></div>
  <div class="panel" id="p-errors"></div>
</div>
<div class="bnav">
  <button class="nb on" id="nb-grammar" onclick="go('grammar')"><span class="nb-i">📐</span>Ngữ pháp</button>
  <button class="nb" id="nb-writing" onclick="go('writing')"><span class="nb-i">✍️</span>Viết</button>
  <button class="nb" id="nb-verbs" onclick="go('verbs')"><span class="nb-i">🔤</span>Động từ</button>
  <button class="nb" id="nb-vocab" onclick="go('vocab')"><span class="nb-i">📚</span>Từ vựng</button>
  <button class="nb" id="nb-tips" onclick="go('tips')"><span class="nb-i">💡</span>Mẹo thi</button>
  <button class="nb" id="nb-errors" onclick="go('errors')"><span class="nb-i">⚠️</span>Lỗi</button>
</div>
<div class="float-fb" id="floatFb"></div>
<script>
const LEVELS=['A1','A2','B1','B2','C1','C2'];
const SPK=`<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
const gg=(k,d=null)=>{try{return JSON.parse(localStorage.getItem(k)||'null')||d;}catch{return d;}};
const ss=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
let gramCheck=gg('gramCheck',{});
let darkMode=false;
let activeFilters={grammar:[],verb:'',vocabTopic:'',tipLv:'',search:''};

function toggleDark(){darkMode=!darkMode;document.documentElement.toggleAttribute('data-dark',darkMode);document.getElementById('darkBtn').textContent=darkMode?'☀️':'🌙';}
function showFloat(msg){const el=document.getElementById('floatFb');el.textContent=msg;el.className='float-fb';void el.offsetWidth;el.classList.add('show');}
function speak(txt,btn=null){
  if(!window.speechSynthesis)return;window.speechSynthesis.cancel();
  if(btn&&btn.classList.contains('go')){btn.classList.remove('go');return;}
  document.querySelectorAll('.spk').forEach(b=>b.classList.remove('go'));
  const u=new SpeechSynthesisUtterance(txt);u.lang='de-DE';u.rate=.87;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('de'));if(v)u.voice=v;
  if(btn){btn.classList.add('go');u.onend=u.onerror=()=>btn.classList.remove('go');}
  speechSynthesis.speak(u);
}
function go(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('p-'+name).classList.add('show');
  document.getElementById('nb-'+name).classList.add('on');
  ({grammar:renderGrammar,writing:renderWriting,verbs:renderVerbs,vocab:renderVocab,tips:renderTips,errors:renderErrors}[name])();
}
function getAccentForLv(l){return{A1:'#16A34A',A2:'#0D9488',B1:'#D97706',B2:'#EA580C',C1:'#7C3AED',C2:'#BE185D'}[l]||'#2563EB';}
function toggleGFilter(l){const f=activeFilters.grammar;const i=f.indexOf(l);if(i>-1)f.splice(i,1);else f.push(l);}
function toggleCheck(el,id){gramCheck[id]=!gramCheck[id];ss('gramCheck',gramCheck);el.classList.toggle('done',gramCheck[id]);el.textContent=gramCheck[id]?'✓':'';showFloat(gramCheck[id]?'✓ Đánh dấu đã học':'↩ Bỏ đánh dấu');}

const GRAMMAR_DATA=[
{id:'a1_sein',lv:'A1',title:'sein — là/ở',sub:'Động từ cơ bản nhất',formula:'ich BIN | du BIST | er/sie/es IST | wir SIND | ihr SEID | sie/Sie SIND',examples:[{de:'Ich bin Student.',vi:'Tôi là sinh viên.'},{de:'Wo bist du?',vi:'Bạn ở đâu?'},{de:'Das ist mein Buch.',vi:'Đây là sách của tôi.'}],tip:'sein là động từ BẤT QUY TẮC quan trọng nhất — học thuộc ngay từ đầu!',danger:null},
{id:'a1_haben',lv:'A1',title:'haben — có',sub:'Động từ cơ bản thứ hai',formula:'ich HABE | du HAST | er/sie/es HAT | wir HABEN | ihr HABT | sie/Sie HABEN',examples:[{de:'Ich habe einen Bruder.',vi:'Tôi có một người anh.'},{de:'Er hat keine Zeit.',vi:'Anh không có thời gian.'}],tip:'haben + kein/keine/kein = không có gì. Kein chia theo Genus: kein Mann, keine Frau, kein Kind',danger:null},
{id:'a1_artikel',lv:'A1',title:'Artikel — Mạo từ',sub:'der/die/das — học kèm danh từ!',formula:'der Mann (m) | die Frau (f) | das Kind (n) | Pl: die\nein Mann | eine Frau | ein Kind | kein/keine/kein',examples:[{de:'Der Mann ist nett.',vi:'Người đàn ông tốt bụng.'},{de:'Eine Frau kommt.',vi:'Một người phụ nữ đến.'}],tip:'Quy tắc vàng: KHÔNG học danh từ đơn lẻ! Luôn học KÈM mạo từ: DER Tisch, DIE Lampe, DAS Fenster',danger:'Người Việt hay bỏ mạo từ vì tiếng Việt không có — đây là lỗi CỰC phổ biến!'},
{id:'a1_verneinung',lv:'A1',title:'Verneinung — Phủ định',sub:'nicht vs. kein',formula:'Verb/Adj/Adv → NICHT | Nomen → KEIN',examples:[{de:'Ich arbeite nicht.',vi:'Tôi không làm việc.'},{de:'Ich habe kein Auto.',vi:'Tôi không có xe.'}],tip:'nicht: phủ định V/Adj/Adv — thường đứng cuối hoặc trước từ bị phủ định\nkein: phủ định danh từ — thay thế ein/eine/ein',danger:null},
{id:'a2_perfekt',lv:'A2',title:'Perfekt — Quá khứ văn nói',sub:'haben/sein + Partizip II',formula:'[S] + haben/sein (vị trí 2) + [O] + Partizip II (cuối)',examples:[{de:'Ich habe gegessen.',vi:'Tôi đã ăn.'},{de:'Er ist nach Berlin gefahren.',vi:'Anh đã đến Berlin.'},{de:'Wir haben viel gelacht.',vi:'Chúng tôi đã cười nhiều.'}],tip:'HABEN: hầu hết động từ\nSEIN: Bewegungsverben (gehen, kommen, fahren, fliegen...) + sein, werden, bleiben\nPartizip II: ge-[Stamm]-t (schwach) | ge-[Stamm]-en (stark/bất quy tắc)',danger:'Đừng dùng Präteritum trong văn nói — chỉ sein/haben/Modal mới dùng Prät. trong nói chuyện!'},
{id:'a2_dativ',lv:'A2',title:'Dativ — Tặng cách (Wem?)',sub:'Sau giới từ và động từ tặng',formula:'dem (m/n) | der (f) | den+n (Pl.)',examples:[{de:'Ich gebe dem Mann das Buch.',vi:'Tôi đưa sách cho người đàn ông.'},{de:'Wir fahren mit dem Bus.',vi:'Chúng tôi đi bằng xe buýt.'}],tip:'Giới từ luôn đi Dativ: mit, bei, von, zu, nach, seit, aus, gegenüber, außer\nDativ Plural: luôn thêm -n: die Männer → mit den Männern',danger:null},
{id:'a2_akkusativ',lv:'A2',title:'Akkusativ — Đối cách (Wen/Was?)',sub:'Tân ngữ trực tiếp',formula:'den (m) | die (f) | das (n) | die (Pl.)\neinen (m) | eine (f) | ein (n)',examples:[{de:'Ich sehe den Mann.',vi:'Tôi thấy người đàn ông.'},{de:'Er kauft einen Kaffee.',vi:'Anh ấy mua cà phê.'}],tip:'CHỈ maskulin thay đổi: der→den, ein→einen\nGiới từ Akkusativ: durch, für, gegen, ohne, um, bis, entlang',danger:'Chỉ mạo từ maskulin thay đổi! der→den. Feminin/Neuter/Plural giữ nguyên.'},

const TIPS_DATA={

B1:{Hören:[{title:'Format Goethe B1 — 4 Teile',items:['Teil 1: Radiosendung — 5 richtig/falsch','Teil 2: Gespräche — Aufgaben zuordnen','Teil 3: Interview — Fragen beantworten','Teil 4: Durchsagen — Infos notieren']},{title:'Distractors',items:['Antworten mit Textwörtern ≠ unbedingt richtig','Implikationen erkennen','Beim 2. Hören: überprüfen, nicht neu entscheiden']}],Lesen:[{title:'Format B1',items:['Teil 1: Texte + Überschriften zuordnen','Teil 2: Zeitungsartikel — Fragen','Teil 3: Lückentext — Wörter einsetzen','Teil 4: richtig/falsch/steht nicht im Text']},{title:'Lückentext',items:['Kontext VOR und NACH Lücke beachten','Welche Wortart fehlt?','Kollokationen: was passt grammatisch und inhaltlich?']}],Schreiben:[{title:'Formeller Brief B1',items:['~100 Wörter','Betreff + Sehr geehrte/r + 3 Punkte + Mit freundlichen Grüßen','Goethe Bewertung: Inhalt 12P + Kommunikation 5P + Formales 8P']},{title:'Häufige Fehler',items:['"Hallo" im formellen Brief → Punktabzug!','Aufgabenpunkt vergessen → 0 Punkte für diesen Punkt','Zu kurz (< 80 Wörter) → Abzug']}],Sprechen:[{title:'B1 Format',items:['Teil 1: Bild gemeinsam beschreiben','Teil 2: Präsentation','Teil 3: Diskussion']},{title:'Meinungsäußerung',items:['"Ich bin der Meinung, dass..."','"Da stimme ich zu." / "Das sehe ich anders."','"Das liegt daran, dass..."']}]},

function renderGrammar(){
  const el=document.getElementById('p-grammar');
  const checked=Object.values(gramCheck).filter(Boolean).length;
  const total=GRAMMAR_DATA.length;
  const lv=activeFilters.grammar;
  const q=activeFilters.search.toLowerCase();
  const filtered=GRAMMAR_DATA.filter(g=>(lv.length===0||lv.includes(g.lv))&&(!q||g.title.toLowerCase().includes(q)||g.formula.toLowerCase().includes(q)));
  const lvColors={A1:'lc-A1',A2:'lc-A2',B1:'lc-B1',B2:'lc-B2',C1:'lc-C1',C2:'lc-C2'};
  el.innerHTML=`
    <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" placeholder="Tìm cấu trúc ngữ pháp..." value="${activeFilters.search}" oninput="activeFilters.search=this.value;renderGrammar()">${activeFilters.search?'<button class="search-clear" onclick="activeFilters.search=\'\';renderGrammar()">✕</button>':''}</div>
    <div class="filter-row">
      ${LEVELS.map(l=>`<button class="fpill${lv.includes(l)?' on':''}" style="${lv.includes(l)?`border-color:${getAccentForLv(l)};color:${getAccentForLv(l)}`:''}" onclick="toggleGFilter('${l}');renderGrammar()">${l}</button>`).join('')}
      <button class="fpill${lv.length===0?' on':''}" onclick="activeFilters.grammar=[];renderGrammar()">Tất cả</button>
    </div>
    <div class="prog-overview"><div class="prog-title">Tiến độ — ${checked}/${total} cấu trúc đã học</div>
      ${LEVELS.map(l=>{const items=GRAMMAR_DATA.filter(g=>g.lv===l);const done=items.filter(g=>gramCheck[g.id]).length;return `<div class="prog-row"><span class="prog-lv badge ${lvColors[l]}">${l}</span><div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${items.length?Math.round(done/items.length*100):0}%;background:${getAccentForLv(l)}"></div></div><span class="prog-count">${done}/${items.length}</span></div>`;}).join('')}
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:.5rem">${filtered.length} cấu trúc · Nhấn ✓ để đánh dấu đã học</div>
    ${filtered.map(c=>{const done=gramCheck[c.id];return `<div class="acc-item"><div class="acc-hd" onclick="this.classList.toggle('open')"><span class="acc-lv badge ${lvColors[c.lv]}">${c.lv}</span><div style="flex:1"><div class="acc-title">${c.title}</div><div class="acc-sub">${c.sub}</div></div><span class="acc-check ${done?'done':''}" onclick="event.stopPropagation();toggleCheck(this,'${c.id}')">${done?'✓':''}</span><span class="acc-arrow">▾</span></div><div class="acc-body"><div class="note-lbl">Công thức</div><div class="formula">${c.formula.replace(/\n/g,'<br>')}</div><div class="note-lbl">Ví dụ</div>${c.examples.map(e=>`<div class="ex-box">${e.de}<button class="spk" onclick="speak('${e.de.replace(/'/g,"\\'")}',this)">${SPK} Nghe</button><div class="ex-vi">${e.vi}</div></div>`).join('')}${c.tip?`<div class="tip-box">💡 ${c.tip.replace(/\n/g,'<br>')}</div>`:''}${c.danger?`<div class="danger-box">⚠️ ${c.danger}</div>`:''}</div></div>`;}).join('')}`;
}
function renderWriting(){
  const el=document.getElementById('p-writing');
  const targetLv=gg('cfg',{toLv:'B1'}).toLv||'B1';
  const activeLv=activeFilters.tipLv||targetLv;
  const allLvs=Object.keys(WRITING_DATA);
  el.innerHTML=`<div class="filter-row">${allLvs.map(l=>`<button class="fpill${activeLv===l?' on':''}" style="${activeLv===l?`border-color:${getAccentForLv(l)};color:${getAccentForLv(l)}`:''}" onclick="activeFilters.tipLv='${l}';renderWriting()">${l}</button>`).join('')}</div>${renderWritingForLv(activeLv)}`;
}
function renderWritingForLv(lv){
  const data=WRITING_DATA[lv];
  if(!data)return`<div style="color:var(--text3);text-align:center;padding:2rem">Chưa có nội dung cho ${lv}</div>`;
  return data.templates.map(t=>`<div class="template-card"><div class="template-hd"><div class="template-hd-title">${t.type} — ${t.title}</div><div class="template-hd-sub">${lv} · Tối thiểu ${t.minWords} từ</div></div><div class="template-body"><div class="note-lbl">📋 Cấu trúc</div>${t.structure.map(s=>`<div style="margin-bottom:.45rem"><div class="ts-label">${s.l}</div><div class="ts-content">${s.c}</div></div>`).join('')}${t.tip?`<div class="tip-box">💡 ${t.tip}</div>`:''}<div class="note-lbl">🔗 Từ nối hữu ích</div><div class="connector-grid">${t.connectors.map(c=>`<div class="conn-card"><div class="conn-de">${c.de}</div><div class="conn-vi">${c.vi}</div><div class="conn-ex">${c.ex}</div></div>`).join('')}</div><div class="note-lbl">📊 Rubric chấm điểm</div>${t.rubric.map(r=>`<div class="rubric-row"><span class="rubric-item">${r.item}</span><span class="rubric-pts">${r.pts} pts</span></div>`).join('')}</div></div>`).join('');
}
function renderVerbs(){
  const el=document.getElementById('p-verbs');
  const search=activeFilters.verb.toLowerCase();
  const filtered=VERB_DATA.filter(v=>!search||v.inf.includes(search)||v.meaning.includes(search));
  const pronouns=['ich','du','er/sie/es','wir','ihr','sie/Sie'];
  el.innerHTML=`<div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" placeholder="Tìm động từ... (gehen, sein...)" value="${activeFilters.verb}" oninput="activeFilters.verb=this.value;renderVerbs()">${activeFilters.verb?'<button class="search-clear" onclick="activeFilters.verb=\'\';renderVerbs()">✕</button>':''}</div><div style="font-size:12px;color:var(--text3);margin-bottom:.6rem">${filtered.length} động từ · BQT = bất quy tắc</div>${filtered.map(v=>`<div class="acc-item"><div class="acc-hd" onclick="this.classList.toggle('open')"><div style="flex:1"><div class="acc-title">${v.inf}</div><div class="acc-sub">${v.meaning}</div></div><button class="spk" onclick="event.stopPropagation();speak('${v.inf}',this)">${SPK}</button><span class="acc-arrow">▾</span></div><div class="acc-body"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.6rem"><div><div class="note-lbl">Präsens</div><table class="verb-table">${v.praesens.map((f,i)=>`<tr><td style="color:var(--text3)">${pronouns[i]}</td><td class="irreg">${f}</td></tr>`).join('')}</table></div><div><div class="note-lbl">Präteritum</div><table class="verb-table">${v.praeteritum.map((f,i)=>`<tr><td style="color:var(--text3)">${pronouns[i]}</td><td class="irreg">${f}</td></tr>`).join('')}</table></div></div><div class="card-flat" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px"><div><div class="note-lbl" style="margin:0 0 2px">Perfekt</div><span style="color:var(--green)">${v.perfekt}</span></div><div><div class="note-lbl" style="margin:0 0 2px">Konj. II</div><span style="color:var(--purple)">${v.konj2}</span></div><div><div class="note-lbl" style="margin:0 0 2px">Imperativ</div><span style="color:var(--amber)">${v.imp}</span></div></div></div></div>`).join('')}`;
}
function renderVocab(){
  const el=document.getElementById('p-vocab');

function renderTips(){

  const targetLv=gg('cfg',{toLv:'B1'}).toLv||'B1';

  const skills=[['Hören','👂','var(--accent)'],['Lesen','📖','var(--green)'],['Schreiben','✍️','var(--purple)'],['Sprechen','🗣️','var(--amber)']];
  const lvs=Object.keys(TIPS_DATA);

function renderErrors(){
  const el=document.getElementById('p-errors');
  const lv=activeFilters.grammar;
  const filtered=ERROR_DATA.filter(e=>lv.length===0||lv.includes(e.lv));
  el.innerHTML=`<div class="filter-row">${LEVELS.filter(l=>ERROR_DATA.some(e=>e.lv===l)).map(l=>`<button class="fpill${lv.includes(l)?' on':''}" style="${lv.includes(l)?`border-color:${getAccentForLv(l)};color:${getAccentForLv(l)}`:''}" onclick="toggleGFilter('${l}');renderErrors()">${l}</button>`).join('')}<button class="fpill${lv.length===0?' on':''}" onclick="activeFilters.grammar=[];renderErrors()">Tất cả</button></div><div style="font-size:12px;color:var(--text3);margin-bottom:.5rem">${filtered.length} lỗi phổ biến</div>${filtered.map(e=>`<div class="error-card"><div style="display:flex;gap:6px;margin-bottom:.35rem"><span class="badge lc-${e.lv}">${e.lv}</span><span style="font-size:11px;color:var(--text2);background:#fff;border-radius:6px;padding:2px 7px">${e.cat}</span></div><div class="ec-wrong">✗ ${e.wrong}</div><div class="ec-correct">✓ ${e.correct}</div><div class="ec-explain">💡 ${e.explain}</div></div>`).join('')}<div class="tip-card" style="margin-top:.5rem"><div class="tc-skill" style="color:var(--purple)">🇻🇳 Khó khăn đặc biệt của người Việt</div><ul class="tc-body"><li>Không có mạo từ trong tiếng Việt → luôn học danh từ kèm DER/DIE/DAS</li><li>Không chia động từ trong tiếng Việt → luyện đuôi động từ hàng ngày</li><li>Không có Kasus → Nominativ/Akkusativ/Dativ phải học có hệ thống</li><li>Trật tự SOV trong Nebensatz rất lạ → weil/obwohl → Verb cuối!</li><li>Không có Plural forms → mỗi danh từ phải học kèm dạng số nhiều</li></ul></div>`;
}
renderGrammar();
